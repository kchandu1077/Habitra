<div id="root"></div>
<script type="text/babel" data-presets="react">
/* ═══════════════════════════════════════════════════════
   HABITRA MEGA — Habit Tracker + Spaced Revision System
   ═══════════════════════════════════════════════════════ */

const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ── THEME ─────────────────────────────────────────── */
let P='#6750A4',PC='#EADDFF',BG='#F6F0FF',SUR='#FFFFFF',
    SV='#F0EAFE',OL='#E4DAFB',TX='#1C1B1F',TM='#49454F',TS='#79747E';

const PALETTES={
  aurora:{name:'Aurora',desc:'multi-colour calm',p:'#5B5CE2',pc:'#E8E9FF',bg:'#F7F8FC',sv:'#F0F4FF',ol:'#E1E6F2',
    grad:['#5B5CE2','#00A6A6','#FF8A65'],hero:['#5B5CE2','#00A6A6'],good:'#00A676',warn:'#F57C00',danger:'#D32F2F'},
  purple:{name:'Purple',desc:'classic Habitra',p:'#6750A4',pc:'#EADDFF',bg:'#F6F0FF',sv:'#F0EAFE',ol:'#E4DAFB',
    grad:['#6750A4','#9C68FF','#F57C00'],hero:['#6750A4','#8B5CF6'],good:'#2E7D32',warn:'#F57C00',danger:'#D32F2F'},
  ocean:{name:'Ocean',desc:'blue + teal',p:'#006C9A',pc:'#DDF4FF',bg:'#F3FAFD',sv:'#EAF7FB',ol:'#D2EAF1',
    grad:['#006C9A','#00A6A6','#43A047'],hero:['#006C9A','#00A6A6'],good:'#00897B',warn:'#F9A825',danger:'#C62828'},
  forest:{name:'Forest',desc:'green + gold',p:'#2E7D32',pc:'#E8F5E9',bg:'#F6FAF5',sv:'#EEF7ED',ol:'#DCEED9',
    grad:['#2E7D32','#00897B','#F9A825'],hero:['#2E7D32','#00897B'],good:'#2E7D32',warn:'#F9A825',danger:'#C62828'},
  sunset:{name:'Sunset',desc:'coral + violet',p:'#C2410C',pc:'#FFE7DC',bg:'#FFF8F4',sv:'#FFF1EA',ol:'#F6DED2',
    grad:['#C2410C','#E11D48','#7C3AED'],hero:['#C2410C','#E11D48'],good:'#2E7D32',warn:'#C2410C',danger:'#B91C1C'},
  slate:{name:'Slate',desc:'minimal neutral',p:'#334155',pc:'#E2E8F0',bg:'#F8FAFC',sv:'#F1F5F9',ol:'#E2E8F0',
    grad:['#334155','#0F766E','#7C3AED'],hero:['#334155','#0F766E'],good:'#0F766E',warn:'#D97706',danger:'#DC2626'},
};
let THEME=PALETTES.aurora;
const applyPaletteGlobals=(id='aurora')=>{
  THEME=PALETTES[id]||PALETTES.aurora;
  P=THEME.p;PC=THEME.pc;BG=THEME.bg;SV=THEME.sv;OL=THEME.ol;
  SUR='#FFFFFF';TX='#1C1B1F';TM='#49454F';TS='#79747E';
  if(typeof document!=='undefined'&&document.documentElement){
    const root=document.documentElement;
    root.style.setProperty('--accent',P);
    root.style.setProperty('--accent-soft',PC);
    root.style.setProperty('--app-bg',BG);
    root.style.setProperty('--surface-soft',SV);
    root.style.setProperty('--outline',OL);
  }
};

const HCOLS=[
  {bg:'#EDE7FF',f:'#7C4DFF',dk:'#21005D',lt:'#F5F0FF'},
  {bg:'#FFF3E0',f:'#F57C00',dk:'#4A1800',lt:'#FFF9F0'},
  {bg:'#E0F7FA',f:'#0097A7',dk:'#002B30',lt:'#F0FBFC'},
  {bg:'#FCE4EC',f:'#C2185B',dk:'#4A0020',lt:'#FEF0F5'},
  {bg:'#E8F5E9',f:'#388E3C',dk:'#1B4008',lt:'#F2FAF2'},
  {bg:'#E3F2FD',f:'#1565C0',dk:'#001E3C',lt:'#EFF6FE'},
];
const hc=i=>HCOLS[i%6];

const SUBJ_COLORS={
  'SOM':'#7C4DFF','FM':'#0097A7','SM':'#388E3C','RCC':'#F57C00',
  'Steel':'#C2185B','Geotech':'#1565C0','Highways':'#00897B',
  'Railways':'#6D4C41','Irrigation':'#0288D1','Hydrology':'#1976D2',
  'Environmental':'#2E7D32','Surveying':'#F9A825','CPM':'#E64A19',
  'Math':'#7B1FA2','Reasoning':'#455A64',
};
const subjColor=s=>SUBJ_COLORS[s]||'#6750A4';

const GATE_SUBJECTS=['SOM','FM','SM','RCC','Steel','Geotech','Highways',
  'Railways','Irrigation','Hydrology','Environmental','Surveying','CPM','Math','Reasoning','Other'];

const REV_INTERVALS=[0,3,6,30,60,90];
const REV_LABELS={0:'Same Day',3:'3rd Day',6:'6th Day',30:'30th Day',60:'60th Day',90:'90th Day'};

/* ── GAMIFICATION ─────────────────────────────────── */
const XP_REWARDS={habit:5,allHabits:25,revision:10,studyHour:8,streak7:50,streak30:200,firstEntry:20};
const LEVEL_THRESHOLDS=[0,100,250,500,900,1400,2100,3000,4200,5600,7500];
const LEVEL_NAMES=['Rookie','Scholar','Studious','Diligent','Focused','Sharp','Expert','Master','Elite','Prodigy','Legend'];
const POMO_SECONDS={focus:25*60,short:5*60,long:15*60};
const getLevel=xp=>{let l=0;for(let i=0;i<LEVEL_THRESHOLDS.length;i++){if(xp>=LEVEL_THRESHOLDS[i])l=i;}return l;};
const getLevelProgress=xp=>{const l=getLevel(xp);const cur=LEVEL_THRESHOLDS[l];const nxt=LEVEL_THRESHOLDS[l+1]||LEVEL_THRESHOLDS[l]+2000;return Math.round((xp-cur)/(nxt-cur)*100);};
const getLevelName=xp=>LEVEL_NAMES[Math.min(getLevel(xp),LEVEL_NAMES.length-1)];
const getLevelXpNeeded=xp=>{const l=getLevel(xp);return LEVEL_THRESHOLDS[l+1]||LEVEL_THRESHOLDS[l]+2000;};

const ALL_BADGES=[
  {id:'first_habit',icon:'🌱',name:'First Step',desc:'Complete your first habit'},
  {id:'streak_3',icon:'🔥',name:'On Fire',desc:'3-day habit streak'},
  {id:'streak_7',icon:'⚡',name:'7-Day Warrior',desc:'7-day streak on any habit'},
  {id:'streak_30',icon:'💎',name:'Iron Will',desc:'30-day streak on any habit'},
  {id:'perfect_day',icon:'⭐',name:'Perfect Day',desc:'Complete ALL habits in a day'},
  {id:'perfect_week',icon:'🏆',name:'Perfect Week',desc:'100% habits for 7 days straight'},
  {id:'first_revision',icon:'📚',name:'Revision Start',desc:'Complete first revision'},
  {id:'rev_10',icon:'🎯',name:'Revision Pro',desc:'Complete 10 revision sessions'},
  {id:'rev_50',icon:'🦁',name:'Revision Master',desc:'Complete 50 revision sessions'},
  {id:'all_rev_done',icon:'✅',name:'Complete Cycle',desc:'Fully complete one entry (all 6 revisions)'},
  {id:'hours_10',icon:'⏰',name:'10-Hour Club',desc:'Log 10 total study hours'},
  {id:'hours_50',icon:'📖',name:'50-Hour Scholar',desc:'Log 50 total study hours'},
  {id:'hours_100',icon:'🎓',name:'100-Hour Elite',desc:'Log 100 total study hours'},
  {id:'level_5',icon:'🚀',name:'Level 5 Reached',desc:'Reach Scholar level 5'},
  {id:'subjects_3',icon:'🧠',name:'Multi-Subject',desc:'Study 3+ different subjects'},
  {id:'week_warrior',icon:'💪',name:'Week Warrior',desc:'Log study hours 7 days in a row'},
];

function checkBadges({logs,daily,revEntries,studyHours,xp,existing=[]}){
  const earned=new Set(existing);
  const today=todayStr();

  // first_habit
  const anyHabit=Object.values(logs).some(d=>Object.values(d).some(Boolean));
  if(anyHabit)earned.add('first_habit');

  // streak badges
  const maxStreak=Math.max(0,...daily.map((_,i)=>getStreak(logs,i)));
  if(maxStreak>=3)earned.add('streak_3');
  if(maxStreak>=7)earned.add('streak_7');
  if(maxStreak>=30)earned.add('streak_30');

  // perfect_day
  const hasPerfect=Object.keys(logs).some(k=>{
    const d=logs[k]||{};return daily.length>0&&daily.every((_,i)=>d[i]);
  });
  if(hasPerfect)earned.add('perfect_day');

  // perfect_week — 7 consecutive days all habits done
  let consec=0;
  for(let i=0;i<90;i++){
    const dt=new Date();dt.setDate(dt.getDate()-i);
    const k=dk(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const done=daily.length>0&&daily.every((_,idx)=>(logs[k]||{})[idx]);
    if(done)consec++;else break;
  }
  if(consec>=7)earned.add('perfect_week');

  // revision badges
  const completedRevs=revEntries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===true).length,0);
  if(completedRevs>=1)earned.add('first_revision');
  if(completedRevs>=10)earned.add('rev_10');
  if(completedRevs>=50)earned.add('rev_50');
  if(revEntries.some(e=>REV_INTERVALS.every(iv=>e.reviews[String(iv)]===true)))earned.add('all_rev_done');

  // hours badges
  const totalH=Object.values(studyHours).reduce((a,b)=>a+b,0);
  if(totalH>=10)earned.add('hours_10');
  if(totalH>=50)earned.add('hours_50');
  if(totalH>=100)earned.add('hours_100');

  // level badge
  if(getLevel(xp)>=5)earned.add('level_5');

  // subjects badge
  const subjSet=new Set(revEntries.map(e=>e.subject));
  if(subjSet.size>=3)earned.add('subjects_3');

  // week_warrior — 7 consecutive days with study hours logged
  let hwk=0;
  for(let i=0;i<30;i++){
    const dt=new Date();dt.setDate(dt.getDate()-i);
    const k=dk(dt.getFullYear(),dt.getMonth(),dt.getDate());
    if(studyHours[k]>0)hwk++;else break;
  }
  if(hwk>=7)earned.add('week_warrior');

  return [...earned];
}

/* ── WEAK TOPIC SUGGESTIONS ──────────────────────── */
function getWeakSuggestions({revEntries,logs,daily,studyHours}){
  const tips=[];

  // Overdue revisions by subject
  const overdueBySubj={};
  revEntries.forEach(e=>{
    REV_INTERVALS.forEach(iv=>{
      if(isRevOverdue(e,iv)){overdueBySubj[e.subject]=(overdueBySubj[e.subject]||0)+1;}
    });
  });
  Object.entries(overdueBySubj).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([subj,cnt])=>{
    tips.push({icon:'🔁',color:'#E65100',bg:'#FFF3E0',border:'#FFB74D',
      msg:`${subj} has ${cnt} overdue revision${cnt>1?'s':''}`,
      action:`Open Revisions → filter by ${subj}`,urgency:cnt>=3?'high':'med'});
  });

  // Low 14-day completion habits
  daily.forEach((h,i)=>{
    const rate=getRate(logs,i,14);
    if(rate<50){
      tips.push({icon:'📉',color:'#C62828',bg:'#FFEBEE',border:'#FFCDD2',
        msg:`"${h}" — only ${rate}% done in last 2 weeks`,
        action:'Focus on this habit tomorrow',urgency:rate<25?'high':'med'});
    }
  });

  // No study hours logged today
  const TK=todayStr();
  if(!studyHours[TK]){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yk=dk(yesterday.getFullYear(),yesterday.getMonth(),yesterday.getDate());
    if(!studyHours[yk]){
      tips.push({icon:'📚',color:'#1565C0',bg:'#E3F2FD',border:'#90CAF9',
        msg:'No study hours logged today',action:'Go to Today → tap + Log to track time',urgency:'low'});
    }
  }

  // Subjects with no recent study (last 7 days of revisions)
  const recentSubjs=new Set();
  const cutoff=addDays(todayStr(),-7);
  revEntries.filter(e=>e.dateStudied>=cutoff).forEach(e=>recentSubjs.add(e.subject));
  const allSubjs=[...new Set(revEntries.map(e=>e.subject))];
  const neglected=allSubjs.filter(s=>!recentSubjs.has(s));
  if(neglected.length>0){
    tips.push({icon:'😴',color:'#7B1FA2',bg:'#F3E5F5',border:'#CE93D8',
      msg:`${neglected.slice(0,2).join(', ')} — no new sessions in 7 days`,
      action:'Consider adding a study session',urgency:'low'});
  }

  return tips.slice(0,5);
}

const now2=()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth(),d:d.getDate()};};
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayStr=()=>{const t=now2();return dk(t.y,t.m,t.d);};

const addDays=(ds,n)=>{const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const diffDays=(a,b)=>Math.round((new Date(a)-new Date(b))/86400000);
const wkKey=(dt=new Date())=>{
  const d=new Date(dt);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w=new Date(d.getFullYear(),0,4);
  return d.getFullYear()+'-W'+(1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7));
};

/* ── HABIT STAT UTILS ────────────────────────────────*/
const getStreak=(logs,idx)=>{
  const t=new Date();let s=0;
  for(let i=0;i<400;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])s++;else break;
  }return s;
};
const getLongest=(logs,idx)=>{
  const keys=Object.keys(logs).filter(k=>(logs[k]||{})[idx]).sort();
  if(!keys.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++)
    (new Date(keys[i])-new Date(keys[i-1]))/86400000===1?(cur++,max=Math.max(max,cur)):(cur=1);
  return max;
};
const getRate=(logs,idx,days)=>{
  let c=0;const t=new Date();
  for(let i=0;i<days;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])c++;
  }return Math.round(c/days*100);
};

const getRevDate=(entry,interval)=>addDays(entry.dateStudied,interval);
const isRevDueToday=(entry,interval)=>{
  const rd=getRevDate(entry,interval);
  return rd===todayStr() && entry.reviews[String(interval)]===null;
};
const isRevOverdue=(entry,interval)=>{
  const rd=getRevDate(entry,interval);
  return rd<todayStr() && entry.reviews[String(interval)]===null;
};

};

/* ── POWER FEATURE UTILS ───────────────────────────── */
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));
const average=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;

function getSubjectReadinessRows({revEntries,pyqRecords=[]}){
  const dataSubjects=[...new Set([
    ...revEntries.map(e=>e.subject).filter(Boolean),
    ...pyqRecords.map(p=>p.subject).filter(Boolean),
  ])];
  const subjects=(dataSubjects.length?dataSubjects:GATE_SUBJECTS.slice(0,8));
  return subjects.map(subject=>{
    const entries=revEntries.filter(e=>e.subject===subject);
    const pyqs=pyqRecords.filter(p=>p.subject===subject);
    const solvedPyq=pyqs.filter(p=>p.solved).length;
    const totalSlots=entries.length*REV_INTERVALS.length;
    const doneSlots=entries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===true).length,0);
    const pendingSlots=entries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===null).length,0);
    const overdue=entries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>isRevOverdue(e,iv)).length,0);
    const revScore=totalSlots?doneSlots/totalSlots*100:0;
    const coverageScore=clamp(entries.length*9,0,100);
    const pyqScore=clamp(solvedPyq*10,0,100);
    const lastStudy=entries.map(e=>e.dateStudied).sort().pop();
    const daysSince=lastStudy?Math.max(0,diffDays(todayStr(),lastStudy)):999;
    const recentScore=daysSince<=3?100:daysSince<=7?80:daysSince<=14?58:daysSince<=30?35:10;
    const score=clamp(Math.round(revScore*0.43+coverageScore*0.22+pyqScore*0.2+recentScore*0.15-overdue*5),0,100);
    return{subject,score,entries:entries.length,doneSlots,totalSlots,pendingSlots,overdue,solvedPyq,pyqTotal:pyqs.length,lastStudy,daysSince};
  }).sort((a,b)=>b.score-a.score);
}

function getRankEstimate({readinessRows,avg30,totalHours,gateCountdown}){
  const active=readinessRows.filter(r=>r.entries||r.pyqTotal);
  const readiness=average((active.length?active:readinessRows).map(r=>r.score));
  const habitScore=avg30||0;
  const hourScore=clamp(totalHours/250*100,0,100);
  const urgencyPenalty=gateCountdown<45?8:gateCountdown<90?3:0;
  const preparedness=clamp(Math.round(readiness*0.62+habitScore*0.2+hourScore*0.18-urgencyPenalty),0,100);
  const marks=clamp(Math.round(preparedness*0.78+8),0,100);
  let range='Above 50000',tone='#C62828',label='Foundation phase';
  if(marks>=75){range='Under 1000';tone='#2E7D32';label='Top-rank pace';}
  else if(marks>=65){range='1000 - 3000';tone='#00897B';label='Strong pace';}
  else if(marks>=55){range='3000 - 8000';tone='#1565C0';label='Competitive pace';}
  else if(marks>=45){range='8000 - 18000';tone='#F57C00';label='Needs sharper revision';}
  else if(marks>=35){range='18000 - 50000';tone='#E65100';label='Catch-up required';}
  const confidence=active.length>=8?'medium':active.length>=4?'low-medium':'low';
  return{preparedness,marks,range,tone,label,confidence,activeSubjects:active.length};
}

function getPaceWarning({revEntries,gateCountdown,avg30,studyHours}){
  const pending=revEntries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>e.reviews[String(iv)]===null).length,0);
  const overdue=revEntries.reduce((a,e)=>a+REV_INTERVALS.filter(iv=>isRevOverdue(e,iv)).length,0);
  const days=Math.max(1,gateCountdown||1);
  const neededPerDay=pending/days;
  let recentHours=0;
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);recentHours+=studyHours[dk(d.getFullYear(),d.getMonth(),d.getDate())]||0;}
  const weeklyAvg=recentHours/7;
  let status='On track',tone='#2E7D32',message='Your current backlog is manageable if you keep the daily rhythm.';
  if(overdue>=12||neededPerDay>4||avg30<35){
    status='Falling behind';tone='#C62828';message='Clear overdue revisions first, then cap each day with a small PYQ block.';
  }else if(overdue>=5||neededPerDay>2||avg30<55||weeklyAvg<1){
    status='Needs attention';tone='#F57C00';message='You are close, but the pace needs a little tightening this week.';
  }
  return{status,tone,message,pending,overdue,neededPerDay:Math.round(neededPerDay*10)/10,weeklyAvg:Math.round(weeklyAvg*10)/10};
}

function buildSmartSchedule({revEntries,pyqRecords=[],readinessRows=[],days=14,maxPerDay=4}){
  const tasks=[];
  revEntries.forEach(entry=>{
    REV_INTERVALS.forEach(iv=>{
      if(entry.reviews[String(iv)]===null){
        const due=getRevDate(entry,iv);
        tasks.push({type:'Revision',subject:entry.subject,topic:entry.topic||'Revision entry',
          label:REV_LABELS[iv],due,priority:due<todayStr()?0:1});
      }
    });
  });
  pyqRecords.filter(p=>!p.solved).forEach(p=>{
    tasks.push({type:'PYQ',subject:p.subject,topic:p.topic||'PYQ practice',
      label:p.year?String(p.year):'PYQ',due:todayStr(),priority:2});
  });
  readinessRows.filter(r=>r.score<55).slice(0,5).forEach(r=>{
    tasks.push({type:'Weak Topic',subject:r.subject,topic:'Concept refresh + 5 questions',
      label:`${r.score}% ready`,due:addDays(todayStr(),2),priority:3});
  });
  tasks.sort((a,b)=>a.priority-b.priority||new Date(a.due)-new Date(b.due));
  const plan=Array.from({length:days},(_,i)=>({date:addDays(todayStr(),i),tasks:[]}));
  let cursor=0;
  tasks.forEach(task=>{
    let placed=false;
    for(let tries=0;tries<plan.length;tries++){
      const day=plan[(cursor+tries)%plan.length];
      if(day.tasks.length<maxPerDay){day.tasks.push(task);cursor=(cursor+tries)%plan.length;placed=true;break;}
    }
    if(!placed&&plan.length)plan[plan.length-1].tasks.push(task);
  });
  return plan;
}

/* ── HEATMAP COMPONENT ───────────────────────────── */
function HeatmapGrid({logs,daily,weeks=15}){
  const cells=useMemo(()=>{
    const arr=[];
    const today=new Date();
    const totalDays=weeks*7;
    // pad to start of week
    const startDay=new Date(today);
    startDay.setDate(startDay.getDate()-(totalDays-1));
    const dow=startDay.getDay();
    const padded=[];
    for(let i=0;i<dow;i++)padded.push(null);
    for(let i=0;i<totalDays;i++){
      const d=new Date(startDay);d.setDate(startDay.getDate()+i);
      const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
      const done=daily.length?daily.filter((_,idx)=>(logs[k]||{})[idx]).length:0;
      const pct=daily.length?done/daily.length:0;
      padded.push({k,pct,done,total:daily.length,d:new Date(d)});
    }
    return padded;
  },[logs,daily,weeks]);

  const cols=useMemo(()=>{
    const cols=[];
    for(let c=0;c<Math.ceil(cells.length/7);c++){
      cols.push(cells.slice(c*7,(c+1)*7));
    }
    return cols;
  },[cells]);

  const cellColor=pct=>{
    if(pct===0)return '#EDE7FF';
    if(pct<0.4)return '#C4B5F4';
    if(pct<0.7)return '#9C68FF';
    if(pct<1)return '#7C4DFF';
    return '#4A148C';
  };

  return(
    <div style={{overflowX:'auto',paddingBottom:4}}>
      <div style={{display:'flex',gap:2,minWidth:'fit-content'}}>
        {cols.map((col,ci)=>(
          <div key={ci} style={{display:'flex',flexDirection:'column',gap:2}}>
            {col.map((cell,ri)=>cell===null?(
              <div key={ri} style={{width:10,height:10}}/>
            ):(
              <div key={ri} title={`${cell.d.toDateString()}: ${cell.done}/${cell.total} habits`}
                style={{width:10,height:10,borderRadius:2,
                  background:cellColor(cell.pct),
                  opacity:cell.d>new Date()?0.2:1}}/>
            ))}
          </div>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:4,marginTop:7,justifyContent:'flex-end'}}>
        <span style={{fontSize:9,color:'#79747E'}}>Less</span>
        {[0,0.3,0.6,0.9,1].map(p=>(
          <div key={p} style={{width:10,height:10,borderRadius:2,background:cellColor(p)}}/>
        ))}
        <span style={{fontSize:9,color:'#79747E'}}>More</span>
      </div>
    </div>
  );
}

/* ── GATE QUOTES ────────────────────────────────────*/
const GATE_QUOTES=[
  {q:"Success is the sum of small efforts repeated day in and day out.",a:"Robert Collier"},
  {q:"The secret of getting ahead is getting started.",a:"Mark Twain"},
  {q:"Don't watch the clock; do what it does. Keep going.",a:"Sam Levenson"},
  {q:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke"},
  {q:"Your future is created by what you do today, not tomorrow.",a:"Robert Kiyosaki"},
  {q:"Focus on being productive instead of busy.",a:"Tim Ferriss"},
  {q:"The expert in anything was once a beginner.",a:"Helen Hayes"},
  {q:"Dream big. Start small. Act now.",a:"Robin Sharma"},
  {q:"Consistency is the key to achieving and maintaining momentum.",a:"Darren Hardy"},
  {q:"One day or day one. You decide.",a:"Paulo Coelho"},
  {q:"The pain of discipline is far less than the pain of regret.",a:"Sarah Bombell"},
  {q:"You don't have to be great to start, but you have to start to be great.",a:"Zig Ziglar"},
  {q:"GATE is not just an exam — it's a test of your consistency.",a:"HABITRA"},
  {q:"Revise today what you studied yesterday. That's how toppers think.",a:"HABITRA"},
  {q:"Every topic you master today is one less worry on exam day.",a:"HABITRA"},
  {q:"Small daily improvements lead to stunning long-term results.",a:"Robin Sharma"},
];
const todayQuote=()=>{
  const d=new Date();
  const idx=(d.getFullYear()*10000+d.getMonth()*100+d.getDate())%GATE_QUOTES.length;
  return GATE_QUOTES[idx];
};

/* ── CONFETTI ────────────────────────────────────────*/
const fireConfetti=()=>{
  const colors=['#7C4DFF','#FFB74D','#43A047','#0097A7','#C2185B','#F9A825','#FF5722'];
  const container=document.body;
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(Math.random()*8+6)+'px';
    el.style.height=(Math.random()*8+6)+'px';
    el.style.borderRadius=Math.random()>0.5?'50%':'2px';
    el.style.animationDelay=(Math.random()*1.5)+'s';
    el.style.animationDuration=(Math.random()*1.5+2)+'s';
    container.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
};

/* ── SHARED COMPONENTS ───────────────────────────────*/
const Ring=({pct,size=100,color='#7C4DFF'})=>{
  const r=42,cx=55,cy=55,circ=2*Math.PI*r;
  return(
    <svg width={size} height={size} viewBox="0 0 110 110">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth={9}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={9}
        strokeDasharray={circ} strokeDashoffset={circ-(pct/100)*circ}
        strokeLinecap="round" transform={`rotate(-90 ${cx} ${cy})`}
        style={{transition:'stroke-dashoffset 0.5s ease'}}/>
    </svg>
  );
};
const SH=({ch})=>(
  <div style={{fontSize:10,fontWeight:700,color:'#9E9E9E',letterSpacing:1.5,
    textTransform:'uppercase',marginBottom:8,paddingLeft:2}}>{ch}</div>
);
const IB=({ch,onClick,dis=false,bg=SV})=>(
  <button onClick={!dis?onClick:undefined}

      cursor:dis?'default':'pointer',display:'flex',alignItems:'center',
      justifyContent:'center',opacity:dis?0.28:1,flexShrink:0}}>
    {ch}

);
const Chip=({label,color,small=false})=>(
  <span style={{background:color+'22',color,border:`1px solid ${color}44`,
    borderRadius:20,padding:small?'1px 7px':'2px 9px',
    fontSize:small?9:11,fontWeight:700,flexShrink:0,whiteSpace:'nowrap'}}>
    {label}
  </span>
);
const BSModal=({children,onClose})=>(
  <div onClick={onClose}
    style={{position:'fixed',inset:0,background:'rgba(28,27,31,0.55)',
      display:'flex',alignItems:'flex-end',justifyContent:'center',
      zIndex:50,backdropFilter:'blur(4px)'}}>
    <div onClick={e=>e.stopPropagation()}
      style={{background:SUR,borderRadius:'26px 26px 0 0',
        padding:'10px 18px 36px',width:'100%',maxWidth:500,
        boxShadow:'0 -8px 36px rgba(103,80,164,0.18)',

/* ── RevisionCard ────────────────────────────────────*/
function RevisionCard({entry,onToggle,onDelete,compact=false}){
  const [open,setOpen]=useState(false);
  const col=subjColor(entry.subject);
  const status=getEntryStatus(entry);
  const hasDue=REV_INTERVALS.some(iv=>isRevDueToday(entry,iv)||isRevOverdue(entry,iv));
  const hasOverdue=REV_INTERVALS.some(iv=>isRevOverdue(entry,iv));

  return(
    <div style={{background:SUR,borderRadius:18,border:`1px solid ${hasDue?col+'55':OL}`,
      marginBottom:9,boxShadow:hasDue?`0 2px 12px ${col}22`:'0 1px 4px rgba(103,80,164,0.07)',
      overflow:'hidden'}}>
      <button onClick={()=>setOpen(v=>!v)}
        style={{display:'flex',alignItems:'center',gap:10,width:'100%',
          padding:'12px 14px',background:'none',border:'none',
          textAlign:'left',cursor:'pointer'}}>
        <div style={{width:36,height:36,borderRadius:12,background:col+'22',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontSize:12,fontWeight:900,color:col}}>{entry.subject.slice(0,3)}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
            <span style={{fontSize:13,fontWeight:700,color:TX}}>{entry.subject}</span>
            {entry.topic&&<span style={{fontSize:11,color:TS,fontWeight:500}}>· {entry.topic}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:TS}}>{fmtDate(entry.dateStudied)}</span>
            {entry.pages&&<span style={{fontSize:10,color:TS}}>· pp.{entry.pages}</span>}
            {hasOverdue&&<Chip label="OVERDUE" color='#C62828' small/>}
            {!hasOverdue&&hasDue&&<Chip label="DUE TODAY" color='#E65100' small/>}
            {status==='complete'&&<Chip label="✓ COMPLETE" color='#388E3C' small/>}
          </div>
        </div>
        <Ico d={open?IC.up:IC.down} s={16} c={TS}/>
      </button>

      {open&&(
        <div style={{padding:'0 14px 14px'}}>
          {/* interval progress */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>
            {REV_INTERVALS.map(iv=>{
              const rd=getRevDate(entry,iv);
              const val=entry.reviews[String(iv)];
              const due=isRevDueToday(entry,iv);
              const over=isRevOverdue(entry,iv);
              const done=val===true;
              const bg=done?'#E8F5E9':over?'#FFEBEE':due?'#FFF3E0':SV;
              const border=done?'#43A047':over?'#EF9A9A':due?'#FFB74D':OL;
              const tc=done?'#2E7D32':over?'#C62828':due?'#E65100':TS;
              return(
                <button key={iv} onClick={()=>onToggle(entry.id,iv)}
                  style={{background:bg,border:`2px solid ${border}`,
                    borderRadius:12,padding:'6px 10px',cursor:'pointer',
                    textAlign:'center',minWidth:62,transition:'all 0.15s',
                    fontFamily:'Nunito,sans-serif'}}>
                  <div style={{fontSize:10,fontWeight:700,color:tc}}>{REV_LABELS[iv]}</div>
                  <div style={{fontSize:9,color:tc,marginTop:1,opacity:0.8}}>{fmtDate(rd)}</div>
                  <div style={{fontSize:11,fontWeight:800,marginTop:2,
                    color:done?'#2E7D32':over?'#C62828':due?'#E65100':'#BDBDBD'}}>
                    {done?'✓':over?'!':due?'→':'○'}
                  </div>
                </button>
              );
            })}
          </div>
          {/* completion bar */}
          <div style={{height:4,background:OL,borderRadius:2,marginBottom:10,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,transition:'width 0.4s',
              background:`linear-gradient(90deg,${col},${col}88)`,
              width:`${(REV_INTERVALS.filter(iv=>entry.reviews[String(iv)]===true).length/6)*100}%`
            }}/>
          </div>
          {entry.notes&&(
            <div style={{fontSize:12,color:TM,background:SV,borderRadius:10,
              padding:'8px 10px',marginBottom:10,lineHeight:1.5}}>
              📝 {entry.notes}
            </div>
          )}
          <button onClick={()=>onDelete(entry.id)}
            style={{display:'flex',alignItems:'center',gap:6,
              background:'#FFEBEE',border:'1px solid #FFCDD2',
              borderRadius:10,padding:'6px 12px',cursor:'pointer',
              fontSize:11,fontWeight:700,color:'#D32F2F',
              fontFamily:'Nunito,sans-serif'}}>
            <Ico d={IC.trash} s={12} c='#D32F2F'/> Delete entry
          </button>
        </div>
      )}
    </div>
  );
}

/* ── AddRevisionModal ───────────────────────────────*/
function AddRevisionModal({onAdd,onClose}){
  const [subj,setSubj]=useState('SOM');
  const [customSubj,setCustomSubj]=useState('');
  const [topic,setTopic]=useState('');
  const [pages,setPages]=useState('');
  const [date,setDate]=useState(todayStr());
  const [notes,setNotes]=useState('');

  const doAdd=()=>{
    const s=subj==='Other'?customSubj.trim():subj;
    if(!s){return;}
    const reviews={};
    REV_INTERVALS.forEach(iv=>{reviews[String(iv)]=null;});
    onAdd({id:uid(),subject:s,topic:topic.trim(),pages:pages.trim(),
      dateStudied:date,notes:notes.trim(),reviews});
    onClose();
  };

  return(
    <BSModal onClose={onClose}>
      <div style={{fontSize:17,fontWeight:900,color:TX,marginBottom:16}}>
        📚 Log New Study Session
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div>
          <label style={LBL}>Subject</label>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:subj==='Other'?8:0}}>
            {GATE_SUBJECTS.map(s=>(
              <button key={s} onClick={()=>setSubj(s)}
                style={{padding:'6px 12px',borderRadius:20,border:`2px solid ${subj===s?subjColor(s):OL}`,
                  background:subj===s?subjColor(s)+'22':SUR,
                  color:subj===s?subjColor(s):TM,
                  fontSize:12,fontWeight:700,cursor:'pointer',
                  fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                {s}
              </button>
            ))}
          </div>
          {subj==='Other'&&(
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)}
              placeholder="Enter subject name"
              style={INPS}/>
          )}
        </div>
        <div>
          <label style={LBL}>Topic / Chapter (optional)</label>
          <input value={topic} onChange={e=>setTopic(e.target.value)}
            placeholder="e.g. Bending Stress, Mohr's Circle"
            style={INPS}/>
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <label style={LBL}>Pages (optional)</label>
            <input value={pages} onChange={e=>setPages(e.target.value)}
              placeholder="e.g. 45-67"
              style={INPS}/>
          </div>
          <div style={{flex:1}}>
            <label style={LBL}>Date Studied</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={INPS}/>
          </div>
        </div>
        <div>
          <label style={LBL}>Quick Notes (optional)</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Key concepts, doubts, formulas to remember…"
            style={{...INPS,height:70,resize:'none'}}/>
        </div>
        <div style={{background:'#E8F5E9',borderRadius:12,padding:'10px 12px',
          fontSize:11,color:'#2E7D32',lineHeight:1.6}}>
          🔁 System will auto-schedule reviews at: <b>Same Day → Day 3 → Day 6 → Day 30 → Day 60 → Day 90</b>
        </div>
        <div style={{display:'flex',gap:9,marginTop:4}}>
          <button onClick={doAdd}
            style={{flex:1,padding:'13px',
              background:`linear-gradient(90deg,${P},#9C68FF)`,
              border:'none',borderRadius:14,color:'#FFF',
              fontWeight:900,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Log Session
          </button>
          <button onClick={onClose}
            style={{flex:1,padding:'13px',background:SV,
              border:`2px solid ${OL}`,borderRadius:14,color:TM,
              fontWeight:700,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Cancel
          </button>
        </div>
      </div>
    </BSModal>
  );
}

const LBL={fontSize:11,fontWeight:700,color:TS,display:'block',marginBottom:5,letterSpacing:0.3};
const INPS={width:'100%',border:`2px solid ${OL}`,borderRadius:12,padding:'10px 12px',
  fontSize:13,color:TX,background:SV,boxSizing:'border-box',fontWeight:600,

/* ═══════════════════════════════════════════════════
   REVISION VIEW (full tab)
   ═══════════════════════════════════════════════════ */
function RevisionView({entries,onToggle,onDelete,onAdd}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterSubj,setFilterSubj]=useState('All');
  const [search,setSearch]=useState('');
  const [tab,setTab]=useState('due'); // due | all | complete

  const today=todayStr();
  const allSubjects=['All',...[...new Set(entries.map(e=>e.subject))].sort()];

  const filtered=useMemo(()=>{
    let r=entries;
    if(filterSubj!=='All')r=r.filter(e=>e.subject===filterSubj);
    if(search.trim())r=r.filter(e=>
      e.subject.toLowerCase().includes(search.toLowerCase())||
      e.topic.toLowerCase().includes(search.toLowerCase())
    );
    if(tab==='due')r=r.filter(e=>['due'].includes(getEntryStatus(e)));
    if(tab==='complete')r=r.filter(e=>getEntryStatus(e)==='complete');
    return [...r].sort((a,b)=>a.dateStudied<b.dateStudied?1:-1);
  },[entries,filterSubj,search,tab]);

  const dueCount=entries.filter(e=>getEntryStatus(e)==='due').length;
  const completeCount=entries.filter(e=>getEntryStatus(e)==='complete').length;

  return(
    <div>
      {/* summary cards */}
      <div style={{display:'flex',gap:9,marginBottom:14}}>
        <div style={{flex:1,background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',
          borderRadius:18,padding:'13px',border:'1px solid #FFB74D',
          boxShadow:'0 2px 10px rgba(255,152,0,0.15)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#E65100',letterSpacing:1}}>DUE / OVERDUE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#E65100',lineHeight:1.1}}>{dueCount}</div>
          <div style={{fontSize:11,color:'#F57C00'}}>topics need review</div>
        </div>
        <div style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
          borderRadius:18,padding:'13px',border:'1px solid #A5D6A7',
          boxShadow:'0 2px 10px rgba(56,142,60,0.12)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>COMPLETE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#2E7D32',lineHeight:1.1}}>{completeCount}</div>
          <div style={{fontSize:11,color:'#388E3C'}}>of {entries.length} total</div>
        </div>
      </div>

      {/* search */}
      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}>
          <Ico d={IC.search} s={15} c={TS}/>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search subject or topic…"
          style={{width:'100%',border:`2px solid ${OL}`,borderRadius:14,
            padding:'10px 12px 10px 36px',fontSize:13,color:TX,
            background:SUR,boxSizing:'border-box',fontFamily:'Nunito,sans-serif',
            outline:'none'}}/>
      </div>

      {/* subject filter chips */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:12,
        paddingBottom:4,WebkitOverflowScrolling:'touch'}}>
        {allSubjects.map(s=>(
          <button key={s} onClick={()=>setFilterSubj(s)}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,
              border:`2px solid ${filterSubj===s?(s==='All'?P:subjColor(s)):OL}`,
              background:filterSubj===s?(s==='All'?PC:subjColor(s)+'22'):SUR,
              color:filterSubj===s?(s==='All'?P:subjColor(s)):TM,
              fontSize:11,fontWeight:700,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',whiteSpace:'nowrap'}}>
            {s}
          </button>
        ))}
      </div>

      {/* tab bar */}
      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,
        marginBottom:14,gap:2}}>
        {[['due',`Due/Overdue (${dueCount})`],['all','All Entries'],['complete',`Done (${completeCount})`]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:'8px 4px',borderRadius:12,border:'none',
              background:tab===id?SUR:'transparent',
              color:tab===id?P:TS,
              fontSize:11,fontWeight:tab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:tab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* entries */}
      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'40px 20px',color:TS}}>
          <div style={{fontSize:36,marginBottom:8}}>{tab==='due'?'🎉':'📭'}</div>
          <div style={{fontSize:15,fontWeight:700,color:TX}}>
            {tab==='due'?'No pending reviews!':'No entries found'}
          </div>
          <div style={{fontSize:13,marginTop:4}}>
            {tab==='due'?'All caught up. Keep studying!':'Try a different filter or add new entries'}
          </div>
        </div>
      ):filtered.map(entry=>(
        <RevisionCard key={entry.id} entry={entry}
          onToggle={onToggle} onDelete={onDelete}/>
      ))}

      {showAdd&&<AddRevisionModal onAdd={onAdd} onClose={()=>setShowAdd(false)}/>}
      {/* FAB handled in parent */}
    </div>
  );
}

function StatsView({daily,logs,revEntries}){
  const [stab,setStab]=useState('habits');
  const bestStr=useMemo(()=>Math.max(0,...daily.map((_,i)=>getStreak(logs,i))),[logs,daily]);
  const avg30=useMemo(()=>daily.length?Math.round(daily.reduce((a,_,i)=>a+getRate(logs,i,30),0)/daily.length):0,[logs,daily]);

  /* revision stats per subject */
  const subjStats=useMemo(()=>{
    const m={};
    revEntries.forEach(e=>{
      if(!m[e.subject])m[e.subject]={total:0,done:0,intervals:{0:0,3:0,6:0,30:0,60:0,90:0}};
      m[e.subject].total++;
      let allDone=true;
      REV_INTERVALS.forEach(iv=>{
        if(e.reviews[String(iv)]===true)m[e.subject].intervals[iv]++;
        else allDone=false;
      });
      if(allDone)m[e.subject].done++;
    });
    return Object.entries(m).map(([s,v])=>({subject:s,...v,
      completionPct:v.total?Math.round(
        (REV_INTERVALS.reduce((a,iv)=>a+v.intervals[iv],0)/(v.total*6))*100
      ):0
    })).sort((a,b)=>b.completionPct-a.completionPct);
  },[revEntries]);

  return(
    <div>
      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,marginBottom:14,gap:2}}>
        {[['habits','Habit Stats'],['revision','Revision Stats'],['report','Weekly Report']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setStab(id)}
            style={{flex:1,padding:'9px',borderRadius:12,border:'none',
              background:stab===id?SUR:'transparent',color:stab===id?P:TS,
              fontSize:13,fontWeight:stab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:stab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {stab==='habits'&&(
        <div>
          <div style={{display:'flex',gap:9,marginBottom:14}}>
            <div style={{flex:1,background:`linear-gradient(135deg,${PC},#DDD8FF)`,
              borderRadius:18,padding:'14px',border:`1px solid ${OL}`}}>
              <div style={{fontSize:10,fontWeight:700,color:P,letterSpacing:1}}>BEST STREAK</div>
              <div style={{fontSize:30,fontWeight:900,color:P}}>{bestStr}d</div>
            </div>
            <div style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
              borderRadius:18,padding:'14px',border:'1px solid #A5D6A7'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>30D AVG</div>
              <div style={{fontSize:30,fontWeight:900,color:'#2E7D32'}}>{avg30}%</div>
            </div>
          </div>

          {/* Activity Heatmap */}
          <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:20,
            padding:'14px',marginBottom:14,boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
            <div style={{fontSize:12,fontWeight:800,color:P,marginBottom:10,letterSpacing:0.5}}>
              📅 15-WEEK ACTIVITY MAP
            </div>
            <HeatmapGrid logs={logs} daily={daily} weeks={15}/>
          </div>

          {/* Peak Day Analysis */}
          {(()=>{
            const dayTotals=Array(7).fill(0);const dayCounts=Array(7).fill(0);
            Object.keys(logs).forEach(k=>{
              const d=new Date(k);const dow=d.getDay();
              const done=daily.filter((_,i)=>(logs[k]||{})[i]).length;
              const pct=daily.length?done/daily.length*100:0;
              dayTotals[dow]+=pct;dayCounts[dow]++;
            });
            const dayAvgs=WD.map((_,i)=>dayCounts[i]?Math.round(dayTotals[i]/dayCounts[i]):0);
            const best=Math.max(...dayAvgs);
            return(
              <div style={{background:SUR,border:`1px solid ${OL}`,borderRadius:20,
                padding:'14px',marginBottom:14,boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{fontSize:12,fontWeight:800,color:P,marginBottom:10,letterSpacing:0.5}}>
                  ⚡ PEAK PRODUCTIVITY DAYS
                </div>
                <div style={{display:'flex',gap:5,alignItems:'flex-end',height:60}}>
                  {WD.map((day,i)=>(
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',
                      alignItems:'center',gap:2}}>
                      <div style={{fontSize:8,fontWeight:700,color:dayAvgs[i]===best?P:TS}}>
                        {dayAvgs[i]}%
                      </div>
                      <div style={{width:'100%',borderRadius:'3px 3px 0 0',
                        height:`${Math.max(4,dayAvgs[i])}%`,minHeight:4,
                        background:dayAvgs[i]===best?`linear-gradient(0deg,${P},#B388FF)`:OL,
                        transition:'height 0.4s'}}/>
                      <div style={{fontSize:8,fontWeight:dayAvgs[i]===best?800:500,
                        color:dayAvgs[i]===best?P:TS}}>{day}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:11,color:P,fontWeight:700,marginTop:8}}>
                  🌟 Your most productive day: {WD[dayAvgs.indexOf(best)]}
                </div>
              </div>
            );
          })()}
          {daily.map((h,i)=>{
            const col=hc(i);
            const st=getStreak(logs,i),lg=getLongest(logs,i);
            const r7=getRate(logs,i,7),r30=getRate(logs,i,30);
            return(
              <div key={i} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:9,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:col.f}}/>
                  <span style={{fontSize:13,fontWeight:700,color:TX,flex:1}}>{h}</span>
                  {st>=3&&<Chip label={`🔥${st}d`} color={col.f} small/>}
                </div>
                <div style={{display:'flex',gap:6}}>
                  {[[`${st}d`,'Streak',col.f],[`${r7}%`,'7d',P],[`${r30}%`,'30d','#0097A7'],[`${lg}d`,'Best','#C2185B']].map(([v,l,c2])=>(
                    <div key={l} style={{flex:1,background:SV,borderRadius:12,padding:'8px 4px',textAlign:'center'}}>
                      <div style={{fontSize:15,fontWeight:900,color:c2}}>{v}</div>
                      <div style={{fontSize:9,color:TS,fontWeight:600,marginTop:1,textTransform:'uppercase',letterSpacing:0.5}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{height:4,background:OL,borderRadius:2,marginTop:9,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${r30}%`,background:col.f,borderRadius:2,transition:'width 0.5s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {stab==='revision'&&(
        <div>
          <SH ch="Completion rate by subject"/>
          {subjStats.length===0&&(
            <div style={{textAlign:'center',padding:'30px',color:TS,fontSize:13}}>
              No revision data yet. Start logging study sessions!
            </div>
          )}
          {subjStats.map(({subject,total,done,completionPct,intervals})=>{
            const col=subjColor(subject);
            return(
              <div key={subject} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:10,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                  <div style={{width:32,height:32,borderRadius:10,background:col+'22',
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:11,fontWeight:900,color:col}}>{subject.slice(0,3)}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:800,color:TX}}>{subject}</div>
                    <div style={{fontSize:11,color:TS}}>{total} sessions · {done} fully complete</div>
                  </div>
                  <div style={{fontSize:22,fontWeight:900,color:col}}>{completionPct}%</div>
                </div>
                <div style={{height:6,background:OL,borderRadius:3,overflow:'hidden',marginBottom:10}}>
                  <div style={{height:'100%',width:`${completionPct}%`,
                    background:`linear-gradient(90deg,${col},${col}88)`,
                    borderRadius:3,transition:'width 0.5s'}}/>
                </div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {REV_INTERVALS.map(iv=>(
                    <div key={iv} style={{background:SV,borderRadius:10,
                      padding:'5px 8px',textAlign:'center',flex:'1 1 50px'}}>
                      <div style={{fontSize:13,fontWeight:800,color:col}}>{intervals[iv]}</div>
                      <div style={{fontSize:8,color:TS,letterSpacing:0.5}}>{REV_LABELS[iv]}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {stab==='report'&&(()=>{
        const weeks=[];
        for(let w=0;w<8;w++){
          const d=new Date();d.setDate(d.getDate()-w*7);
          const wk=wkKey(d);
          let totalPct=0,days=0;
          for(let dd=0;dd<7;dd++){
            const day=new Date(d);day.setDate(day.getDate()-dd);
            const k=dk(day.getFullYear(),day.getMonth(),day.getDate());
            const done=daily.filter((_,i)=>(logs[k]||{})[i]).length;
            const pct=daily.length?Math.round(done/daily.length*100):0;
            if(Object.keys(logs[k]||{}).length>0||w===0){totalPct+=pct;days++;}
          }
          const avg=days>0?Math.round(totalPct/Math.max(days,1)):0;
          const label=w===0?'This Week':w===1?'Last Week':`${w} weeks ago`;
          weeks.push({label,avg,wk});
        }
        return(
          <div>
            <SH ch="Weekly Performance — Last 8 Weeks"/>
            {weeks.map(({label,avg,wk},i)=>(
              <div key={wk} style={{background:'#FFFFFF',border:'1px solid #E4DAFB',
                borderRadius:18,padding:'12px 16px',marginBottom:9,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'#1C1B1F'}}>{label}</div>
                    <div style={{fontSize:10,color:'#79747E'}}>{wk}</div>
                  </div>
                  <div style={{fontSize:24,fontWeight:900,
                    color:avg>=80?'#2E7D32':avg>=50?'#F57C00':'#C62828'}}>{avg}%</div>
                </div>
                <div style={{height:8,background:'#E4DAFB',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:4,transition:'width 0.5s',
                    background:avg>=80?'linear-gradient(90deg,#43A047,#66BB6A)':avg>=50?'linear-gradient(90deg,#F57C00,#FFB74D)':'linear-gradient(90deg,#E53935,#EF9A9A)',
                    width:`${avg}%`}}/>
                </div>
                <div style={{fontSize:10,color:avg>=80?'#2E7D32':avg>=50?'#F57C00':'#C62828',
                  fontWeight:700,marginTop:5}}>
                  {avg>=80?'🏆 Excellent week!':avg>=50?'💪 Good effort, push harder':'⚠️ Needs improvement'}
                </div>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   TODAY VIEW — Minimalist redesign
   ═══════════════════════════════════════════════════ */
function TodayView({daily,logs,TK,toggleToday,revEntries,onRevToggle,chart7,todayDone,todayPct,bestStr,avg30,
  gateCountdown,gateDate,setGateDate,todayHours,weekHours,totalHours,
  showHoursInput,setShowHoursInput,hoursInput,setHoursInput,logHours,darkMode,
  suggestions,xp,badges}){
  const dueEntries=useMemo(()=>getTodayDueEntries(revEntries),[revEntries]);
  const quote=useMemo(()=>todayQuote(),[]);
  const [editGate,setEditGate]=useState(false);
  const [gateInput,setGateInput]=useState(gateDate);
  const [showChart,setShowChart]=useState(false);
  const [showDueRevs,setShowDueRevs]=useState(false);
  const gateColor=gateCountdown<=30?'#FF5722':gateCountdown<=90?'#F57C00':P;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>

      {/* ── TOP INFO STRIP: Gate + Study Hours ── */}
      <div style={{background:'#FFFFFF',borderRadius:16,border:'1px solid #EDE8FB',
        boxShadow:'0 1px 6px rgba(103,80,164,0.06)',overflow:'hidden'}}>

        {/* Gate countdown row */}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',
          borderBottom:'1px solid #F0EAFE'}}>
          <div style={{width:36,height:36,borderRadius:12,
            background:gateColor+'18',display:'flex',alignItems:'center',
            justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:18}}>🎯</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:'#9E94C0',letterSpacing:1,textTransform:'uppercase'}}>GATE Countdown</div>
            <div style={{fontSize:15,fontWeight:900,color:gateColor,lineHeight:1.2}}>
              {gateCountdown} days left
              {editGate&&(
                <span style={{marginLeft:8}}>
                  <input type="date" value={gateInput} onChange={e=>setGateInput(e.target.value)}
                    style={{border:'1px solid #E4DAFB',borderRadius:8,padding:'2px 7px',fontSize:11,
                      fontWeight:700,color:'#1C1B1F',background:'#F6F0FF',outline:'none',
                      fontFamily:'Nunito,sans-serif',marginRight:5}}/>
                  <button onClick={()=>{setGateDate(gateInput);setEditGate(false);}}
                    style={{background:P,border:'none',borderRadius:8,padding:'3px 10px',color:'#FFF',
                      fontWeight:800,fontSize:11,cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>Save</button>
                </span>
              )}
            </div>
            <div style={{fontSize:10,color:'#9E94C0',fontWeight:500}}>{gateDate}</div>
          </div>
          {!editGate&&(
            <button onClick={()=>{setGateInput(gateDate);setEditGate(true);}}
              style={{background:'#F6F0FF',border:'none',borderRadius:10,padding:'5px 10px',
                cursor:'pointer',fontSize:11,fontWeight:700,color:'#9E94C0',
                fontFamily:'Nunito,sans-serif'}}>✏️ Edit</button>
          )}
        </div>

        {/* Study Hours row */}
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'11px 16px'}}>
          <div style={{width:36,height:36,borderRadius:12,
            background:'#E8F5E9',display:'flex',alignItems:'center',
            justifyContent:'center',flexShrink:0}}>
            <span style={{fontSize:18}}>📚</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:'#9E94C0',letterSpacing:1,textTransform:'uppercase'}}>Study Time</div>
            <div style={{display:'flex',gap:10,alignItems:'baseline',flexWrap:'wrap'}}>
              <span style={{fontSize:16,fontWeight:900,color:'#2E7D32'}}>{todayHours}h</span>
              <span style={{fontSize:11,color:'#81C784',fontWeight:600}}>today</span>
              <span style={{fontSize:13,fontWeight:700,color:'#43A047'}}>{weekHours}h</span>
              <span style={{fontSize:11,color:'#81C784',fontWeight:600}}>week</span>
              <span style={{fontSize:12,fontWeight:600,color:'#66BB6A'}}>{Math.round(totalHours)}h</span>
              <span style={{fontSize:11,color:'#81C784',fontWeight:500}}>total</span>
            </div>
          </div>
          <button onClick={()=>setShowHoursInput(v=>!v)}
            style={{background:showHoursInput?'#FFEBEE':'#E8F5E9',border:'none',
              borderRadius:10,padding:'6px 12px',cursor:'pointer',color:showHoursInput?'#D32F2F':'#2E7D32',
              fontSize:11,fontWeight:800,flexShrink:0,fontFamily:'Nunito,sans-serif'}}>
            {showHoursInput?'Cancel':'+ Log'}
          </button>
        </div>

        {showHoursInput&&(
          <div style={{padding:'0 16px 12px',display:'flex',gap:8,alignItems:'center'}}>
            <input type="number" min="0" max="24" step="0.5" value={hoursInput}
              onChange={e=>setHoursInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&logHours()}
              autoFocus placeholder="e.g. 4.5"
              style={{flex:1,border:'2px solid #A5D6A7',borderRadius:10,padding:'8px 12px',
                fontSize:14,fontWeight:700,color:'#1B5E20',background:'#F1FAF1',outline:'none',
                fontFamily:'Nunito,sans-serif'}}/>
            <span style={{fontSize:12,color:'#388E3C',fontWeight:600}}>hours</span>
            <button onClick={logHours}
              style={{background:'#43A047',border:'none',borderRadius:10,padding:'8px 14px',
                cursor:'pointer',color:'#FFF',fontWeight:800,fontSize:12,fontFamily:'Nunito,sans-serif'}}>
              Save
            </button>
          </div>
        )}
      </div>

      {/* ── HERO CARD: Progress + Stats + Quote ── */}
      <div style={{background:`linear-gradient(135deg,${THEME.hero[0]} 0%,${THEME.hero[1]} 100%)`,
        borderRadius:20,padding:'18px 20px',
        boxShadow:'0 6px 24px rgba(103,80,164,0.22)'}}>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:12}}>
          <div style={{position:'relative',flexShrink:0}}>
            <Ring pct={todayPct} size={88} color='#FFF'/>
            <div style={{position:'absolute',top:'50%',left:'50%',
              transform:'translate(-50%,-50%)',textAlign:'center'}}>
              <div style={{fontSize:17,fontWeight:900,color:'#FFF',lineHeight:1}}>{todayPct}%</div>
            </div>
          </div>
          <div style={{color:'#FFF',flex:1}}>
            <div style={{fontSize:22,fontWeight:900,lineHeight:1.2}}>
              {todayPct===100?'🎉 Perfect!':todayDone===0?'Lets go!':todayDone+' done'}
            </div>
            <div style={{fontSize:12,opacity:0.75,marginTop:2}}>
              {todayPct===100?'All habits complete!':(daily.length-todayDone)+' left · '+dueEntries.length+' rev due'}
            </div>
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
              <span style={{background:'rgba(255,255,255,0.18)',borderRadius:8,
                padding:'3px 9px',fontSize:10,fontWeight:700}}>🔥 {bestStr}d</span>
              <span style={{background:'rgba(255,255,255,0.18)',borderRadius:8,
                padding:'3px 9px',fontSize:10,fontWeight:700}}>📊 {avg30}% / 30d</span>
              <span style={{background:'rgba(255,255,255,0.18)',borderRadius:8,
                padding:'3px 9px',fontSize:10,fontWeight:700}}>
                {getLevel(xp)<=2?'🌱':getLevel(xp)<=4?'📖':getLevel(xp)<=6?'🎯':'🏆'} Lv{getLevel(xp)}
              </span>
            </div>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,
            color:'rgba(255,255,255,0.6)',marginBottom:3}}>
            <span>{getLevelName(xp)} · {xp} XP · {badges.length}/{ALL_BADGES.length} badges</span>
            <span>{getLevelProgress(xp)}% → Lv{getLevel(xp)+1}</span>
          </div>
          <div style={{height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${getLevelProgress(xp)}%`,
              background:'rgba(255,255,255,0.85)',borderRadius:2,transition:'width 0.5s'}}/>
          </div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.15)',paddingTop:10}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.82)',fontStyle:'italic',lineHeight:1.5}}>
            ✨ "{quote.q}"
          </div>
          <div style={{fontSize:9,color:'rgba(255,255,255,0.5)',fontWeight:700,marginTop:2}}>— {quote.a}</div>
        </div>
      </div>

      {/* ── DUE REVISIONS (collapsible) ── */}
      {dueEntries.length>0&&(
        <div style={{background:'#FFFFFF',borderRadius:16,border:'1.5px solid #FFB74D',
          overflow:'hidden',boxShadow:'0 2px 10px rgba(255,152,0,0.1)'}}>
          <button onClick={()=>setShowDueRevs(v=>!v)}
            style={{display:'flex',alignItems:'center',gap:10,width:'100%',
              padding:'12px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'#E65100',flexShrink:0}}/>
            <span style={{flex:1,fontSize:13,fontWeight:800,color:'#E65100'}}>
              {dueEntries.length} Revision{dueEntries.length>1?'s':''} Due
            </span>
            <Ico d={showDueRevs?IC.up:IC.down} s={14} c='#E65100'/>
          </button>
          {showDueRevs&&(
            <div style={{padding:'0 14px 12px',display:'flex',flexDirection:'column',gap:7}}>
              {dueEntries.slice(0,4).map(entry=>{
                const dueIntervals=REV_INTERVALS.filter(iv=>isRevDueToday(entry,iv)||isRevOverdue(entry,iv));
                const isOver=dueIntervals.some(iv=>isRevOverdue(entry,iv));
                const col=subjColor(entry.subject);
                return(
                  <div key={entry.id} style={{background:isOver?'#FFF5F5':'#FFFBF3',
                    borderRadius:12,padding:'10px 12px',
                    border:`1px solid ${isOver?'#FFCDD2':'#FFE0B2'}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
                      <span style={{fontSize:11,fontWeight:800,color:col,
                        background:col+'18',borderRadius:7,padding:'2px 8px'}}>{entry.subject}</span>
                      {entry.topic&&<span style={{fontSize:11,color:TM,flex:1,overflow:'hidden',
                        textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{entry.topic}</span>}
                      {isOver&&<Chip label="OVERDUE" color='#C62828' small/>}
                      <span style={{fontSize:10,color:TS,marginLeft:'auto',flexShrink:0}}>{fmtDate(entry.dateStudied)}</span>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                      {dueIntervals.map(iv=>(
                        <button key={iv} onClick={()=>onRevToggle(entry.id,iv)}
                          style={{padding:'5px 10px',borderRadius:9,
                            border:`1.5px solid ${entry.reviews[String(iv)]===true?'#43A047':'#FFB74D'}`,
                            background:entry.reviews[String(iv)]===true?'#E8F5E9':'#FFF',
                            color:entry.reviews[String(iv)]===true?'#2E7D32':'#E65100',
                            fontSize:11,fontWeight:700,cursor:'pointer',
                            fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                          {entry.reviews[String(iv)]===true?'✓ ':''}{REV_LABELS[iv]}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}
              {dueEntries.length>4&&(
                <div style={{fontSize:11,color:'#E65100',fontWeight:600,paddingLeft:2}}>
                  +{dueEntries.length-4} more → Revise tab
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── HABITS CARD ── */}

          const st=getStreak(logs,i);

          return(
            <button key={i} className="hbtn" onClick={()=>toggleToday(i)}
              style={{display:'flex',alignItems:'center',gap:11,width:'100%',
                padding:'10px 16px',

                textAlign:'left',cursor:'pointer',transition:'background 0.12s'}}>

                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all 0.15s'}}>
                {done&&<Ico d={IC.check} s={12} c='#FFF' sw={3}/>}

              {st>=3&&<span style={{fontSize:10,fontWeight:800,color:col.f,

                padding:'2px 7px',borderRadius:8,flexShrink:0}}>🔥{st}</span>}
            </button>
          );
        })}
      </div>

      {/* ── 7-DAY CHART (collapsible) ── */}
      <div style={{background:'#FFFFFF',borderRadius:16,border:'1px solid #EDE8FB',
        overflow:'hidden',boxShadow:'0 1px 6px rgba(103,80,164,0.06)'}}>
        <button onClick={()=>setShowChart(v=>!v)}

            padding:'12px 16px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
          <span style={{flex:1,fontSize:10,fontWeight:800,color:'#9E94C0',letterSpacing:1.2,
            textTransform:'uppercase'}}>7-Day History</span>
          <div style={{display:'flex',gap:3,alignItems:'flex-end',height:16}}>
            {chart7.map((d,i)=>(
              <div key={i} style={{width:6,borderRadius:'2px 2px 0 0',
                height:`${Math.max(20,d.pct)/100*16}px`,
                background:d.isToday?P:'#D4C9F5'}}/>
            ))}
          </div>
          <Ico d={showChart?IC.up:IC.down} s={13} c='#9E94C0'/>
        </button>
        {showChart&&(
          <div style={{padding:'4px 16px 14px'}}>
            <div style={{display:'flex',gap:5,height:80,alignItems:'flex-end'}}>
              {chart7.map((d,i)=>(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                  <div style={{fontSize:9,fontWeight:700,color:d.isToday?P:TS}}>{d.pct}%</div>
                  <div style={{width:'100%',borderRadius:'4px 4px 0 0',
                    height:`${Math.max(4,d.pct)}%`,minHeight:4,
                    background:d.isToday?`linear-gradient(0deg,${P},#A78BFA)`:'#E4DAFB',
                    transition:'height 0.4s'}}/>
                  <div style={{fontSize:9,fontWeight:d.isToday?800:500,
                    color:d.isToday?P:TS}}>{d.day}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── SMART SUGGESTIONS (collapsible) ── */}
      <SuggestionsCard suggestions={suggestions}/>

    </div>
  );
}

        </button>

    </div>

/* ═══════════════════════════════════════════════════
   MONTHLY VIEW
   ═══════════════════════════════════════════════════ */
function MonthlyView({daily,logs,vy,vm,T,toggleDay}){
  const dim=daysIn(vy,vm);
  return(
    <div>
      <div style={{display:'flex',gap:14,fontSize:11,color:TS,
        marginBottom:10,paddingLeft:2,flexWrap:'wrap'}}>
        <span style={{color:'#388E3C',fontWeight:700}}>≥80% green</span>
        <span style={{color:'#F57C00',fontWeight:700}}>50-79% orange</span>
        <span style={{color:'#C62828',fontWeight:700}}>below 50% red</span>
      </div>
      <div style={{background:SUR,borderRadius:20,overflow:'hidden',
        border:`1px solid ${OL}`,boxShadow:'0 1px 6px rgba(103,80,164,0.08)',marginBottom:12}}>
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <table style={{borderCollapse:'collapse',width:'100%',minWidth:(140+dim*22)+'px'}}>
            <thead>
              <tr style={{background:'#FAFAFF'}}>
                <th style={{position:'sticky',left:0,zIndex:5,background:'#FAFAFF',
                  borderRight:`1px solid ${OL}`,textAlign:'left',
                  padding:'8px 10px',fontSize:10,color:TS,fontWeight:700,minWidth:130}}>HABIT</th>
                {Array.from({length:dim},(_,di)=>{
                  const wd=new Date(vy,vm,di+1);
                  const isT=T.y===vy&&T.m===vm&&T.d===di+1;
                  return(
                    <th key={di} style={{padding:'5px 1px',minWidth:22,textAlign:'center',
                      fontSize:9,fontWeight:700,background:isT?PC:'#FAFAFF',color:isT?P:TS}}>
                      <div>{di+1}</div>
                      <div style={{opacity:0.5}}>{WD[wd.getDay()][0]}</div>
                    </th>
                  );
                })}
                <th style={{padding:'5px 7px',fontSize:9,color:TS,fontWeight:700,minWidth:34,textAlign:'center'}}>%</th>
              </tr>
            </thead>
            <tbody>
              {daily.map((h,hi)=>{
                const col=hc(hi);
                const rel=T.y===vy&&T.m===vm?T.d:dim;
                let dn=0;
                for(let d=1;d<=rel;d++)if((logs[dk(vy,vm,d)]||{})[hi])dn++;
                const mpct=Math.round(dn/rel*100);
                return(
                  <tr key={hi} style={{borderTop:`1px solid #F0EAFE`}}>
                    <td style={{position:'sticky',left:0,zIndex:2,background:SUR,
                      borderRight:`1px solid ${OL}`,padding:'6px 10px'}}>
                      <span style={{fontSize:11,fontWeight:700,color:TX,display:'block',
                        maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h}</span>
                    </td>
                    {Array.from({length:dim},(_,di)=>{
                      const day=di+1,k2=dk(vy,vm,day);
                      const on=!!(logs[k2]||{})[hi];
                      const fut=T.y===vy&&T.m===vm&&day>T.d;
                      const isT2=T.y===vy&&T.m===vm&&T.d===day;
                      return(
                        <td key={di} style={{padding:'3px 1px',textAlign:'center',
                          background:isT2?`${PC}66`:undefined}}>
                          <button onClick={()=>!fut&&toggleDay(hi,vy,vm,day)}
                            style={{width:15,height:15,borderRadius:4,border:'none',
                              background:on?col.f:'#EEE8FF',cursor:fut?'default':'pointer',
                              opacity:fut?0.18:1,display:'block',margin:'0 auto',
                              boxShadow:on?`0 1px 4px ${col.f}55`:undefined,
                              transition:'all 0.12s'}}/>
                        </td>
                      );
                    })}
                    <td style={{textAlign:'center',padding:'3px 7px'}}>
                      <span style={{fontSize:11,fontWeight:800,
                        color:mpct>=80?'#388E3C':mpct>=50?'#F57C00':'#C62828'}}>{mpct}%</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function RadarChart({rows}){
  const data=(rows.length?rows:GATE_SUBJECTS.slice(0,6).map(s=>({subject:s,score:0}))).slice(0,6);
  const size=236,c=size/2,max=82;
  const pts=data.map((r,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/data.length;
    const rad=max*(r.score/100);
    return{x:c+Math.cos(a)*rad,y:c+Math.sin(a)*rad,label:r.subject,score:r.score,ax:c+Math.cos(a)*max,ay:c+Math.sin(a)*max};
  });
  const poly=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const rings=[0.25,0.5,0.75,1].map(k=>data.map((_,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/data.length;
    return`${c+Math.cos(a)*max*k},${c+Math.sin(a)*max*k}`;
  }).join(' '));
  return(
    <div style={{display:'flex',justifyContent:'center',overflow:'hidden'}}>
      <svg width="100%" height={260} viewBox={`0 0 ${size} ${size+24}`} style={{maxWidth:330}}>
        {rings.map((r,i)=><polygon key={i} points={r} fill="none" stroke={OL} strokeWidth="1"/>)}
        {pts.map((p,i)=><line key={i} x1={c} y1={c} x2={p.ax} y2={p.ay} stroke={OL} strokeWidth="1"/>)}
        <polygon points={poly} fill={P+'30'} stroke={P} strokeWidth="3" strokeLinejoin="round"/>
        {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="4" fill={P}/>)}
        {pts.map((p,i)=>{
          const dx=p.ax<c?-38:p.ax>c?8:-18;
          const dy=p.ay<c?-8:p.ay>c?20:4;
          return(
            <g key={p.label}>
              <text x={p.ax+dx} y={p.ay+dy} fontSize="10" fontWeight="800" fill={TX}>{p.label.slice(0,9)}</text>
              <text x={p.ax+dx} y={p.ay+dy+12} fontSize="9" fontWeight="700" fill={TS}>{p.score}%</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function AiCoachPanel({apiKey,setApiKey,aiModel,setAiModel,daily,logs,TK,revEntries,readinessRows,pace,gateCountdown,studyHours,toast$}){
  const [prompt,setPrompt]=useState('Make my best study plan for today.');
  const [busy,setBusy]=useState(false);
  const [messages,setMessages]=useState(()=>{try{return JSON.parse(localStorage.getItem('habitra_ai_chat')||'[]');}catch(e){return [];}});
  useEffect(()=>{try{localStorage.setItem('habitra_ai_chat',JSON.stringify(messages.slice(-10)));}catch(e){}},[messages]);

  const askClaude=async()=>{
    const key=apiKey.trim();
    const q=prompt.trim();
    if(!key){toast$('Add your Claude API key first','warn');return;}
    if(!q){toast$('Type a question for the coach','warn');return;}
    const done=daily.filter((_,i)=>(logs[TK]||{})[i]).length;
    const due=getTodayDueEntries(revEntries).slice(0,10).map(e=>`${e.subject}: ${e.topic||'revision'} (${fmtDate(e.dateStudied)})`);
    const weak=readinessRows.slice().sort((a,b)=>a.score-b.score).slice(0,6)
      .map(r=>`${r.subject} ${r.score}% ready, ${r.overdue} overdue, ${r.solvedPyq} PYQ solved`);
    const context=[
      `GATE days left: ${gateCountdown}`,
      `Today habits: ${done}/${daily.length}`,
      `Study hours today: ${studyHours[TK]||0}`,
      `Pace status: ${pace.status}; pending revisions ${pace.pending}; overdue ${pace.overdue}`,
      `Due revisions: ${due.join('; ')||'none'}`,
      `Weak subjects: ${weak.join('; ')||'not enough data'}`
    ].join('\n');
    setBusy(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-api-key':key,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:aiModel||'claude-sonnet-4-20250514',
          max_tokens:850,
          system:'You are a concise GATE Civil study coach. Give direct, practical plans. Use the data, avoid generic motivation, and keep the answer under 180 words unless asked.',
          messages:[
            ...messages.slice(-6).map(m=>({role:m.role,content:m.content})),
            {role:'user',content:`${q}\n\nMy HABITRA data:\n${context}`}
          ]
        })
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.error?.message||'Claude API request failed');
      const ans=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
      setMessages(m=>[...m,{role:'user',content:q},{role:'assistant',content:ans||'No text response received.'}].slice(-12));
      setPrompt('');
      buzz([20,20,20]);
    }catch(e){
      toast$(e.message||'AI coach failed','err');
    }finally{setBusy(false);}
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <Panel>
        <label style={LBL}>Claude API key</label>
        <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
          placeholder="sk-ant-..." style={{...INPS,background:SV,marginBottom:9}}/>
        <label style={LBL}>Model ID</label>
        <input value={aiModel} onChange={e=>setAiModel(e.target.value)}
          placeholder="claude-sonnet-4-20250514" style={{...INPS,background:SV}}/>
      </Panel>
      <Panel>
        <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
          placeholder="Ask: what should I study in 3 hours today?"
          style={{width:'100%',minHeight:82,border:`2px solid ${OL}`,borderRadius:14,
            padding:12,resize:'vertical',fontSize:13,fontWeight:600,color:TX,background:SV,
            fontFamily:'Nunito,sans-serif',outline:'none'}}/>
        <button onClick={askClaude} disabled={busy}
          style={{marginTop:9,width:'100%',border:'none',borderRadius:14,padding:'12px 14px',
            background:`linear-gradient(90deg,${THEME.grad[0]},${THEME.grad[1]})`,
            color:'#FFF',fontSize:13,fontWeight:900,cursor:busy?'default':'pointer',
            opacity:busy?0.65:1,fontFamily:'Nunito,sans-serif'}}>
          {busy?'Thinking...':'Ask Study Coach'}
        </button>
      </Panel>
      {messages.length>0&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {messages.slice(-6).map((m,i)=>(
            <div key={i} style={{alignSelf:m.role==='user'?'flex-end':'stretch',
              maxWidth:m.role==='user'?'88%':'100%',background:m.role==='user'?PC:SUR,
              border:`1px solid ${m.role==='user'?P+'35':OL}`,borderRadius:16,
              padding:'10px 12px',whiteSpace:'pre-wrap',fontSize:12,lineHeight:1.55,
              color:m.role==='user'?P:TX,fontWeight:m.role==='user'?800:600}}>
              {m.content}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function ShareCardPanel({todayPct,todayDone,daily,bestStr,avg30,xp,badges,gateCountdown,toast$}){

    g.addColorStop(0,THEME.grad[0]);g.addColorStop(0.55,THEME.grad[1]);g.addColorStop(1,THEME.grad[2]);

    ctx.fillStyle='rgba(255,255,255,0.16)';
    for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(120+i*110,160+i*90,90,0,Math.PI*2);ctx.fill();}

    ctx.font='700 30px Nunito, Arial';ctx.fillStyle='#49454F';ctx.fillText(`${todayDone}/${daily.length} habits completed`,118,397);

    stats.forEach((s,i)=>{

    const map={};

      if(e.reviews[String(iv)]===null){
        const day=getRevDate(e,iv);
        if(!map[day])map[day]=[];
        map[day].push({subject:e.subject,label:REV_LABELS[iv],over:day<todayStr()});
      }
    }));
    return map;
  },[revEntries]);
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);

        {WD.map(w=><div key={w} style={{fontSize:9,fontWeight:900,color:TS,textAlign:'center'}}>{w}</div>)}
