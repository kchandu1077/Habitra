const now2=()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth(),d:d.getDate()};};
const dk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayStr=()=>{const t=now2();return dk(t.y,t.m,t.d);};
const daysIn=(y,m)=>new Date(y,m+1,0).getDate();
const addDays=(ds,n)=>{const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const diffDays=(a,b)=>Math.round((new Date(a)-new Date(b))/86400000);
const wkKey=(dt=new Date())=>{
  const d=new Date(dt);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w=new Date(d.getFullYear(),0,4);
  return d.getFullYear()+'-W'+(1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7));
};
const fmtDate=s=>{if(!s)return '';const d=new Date(s);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});};

/* ── HABIT STAT UTILS ────────────────────────────────*/
const getStreak=(logs,idx)=>{
  const t=new Date();let s=0;
  for(let i=0;i<400;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])s++;else break;
  }return s;
};
const getLongest=(logs,idx)=>{
  const keys=Object.keys(logs).filter(k=>(logs[k]||{})[idx]).sort();
  if(!keys.length)return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++)
    (new Date(keys[i])-new Date(keys[i-1]))/86400000===1?(cur++,max=Math.max(max,cur)):(cur=1);
  return max;
};
const getRate=(logs,idx,days)=>{
  let c=0;const t=new Date();
  for(let i=0;i<days;i++){
    const d=new Date(t);d.setDate(d.getDate()-i);
    if((logs[dk(d.getFullYear(),d.getMonth(),d.getDate())]||{})[idx])c++;
  }return Math.round(c/days*100);
};

/* ── REVISION UTILS ──────────────────────────────────*/
const getRevDate=(entry,interval)=>addDays(entry.dateStudied,interval);
const isRevDueToday=(entry,interval)=>{
  const rd=getRevDate(entry,interval);
  return rd===todayStr() && entry.reviews[String(interval)]===null;
};
const isRevOverdue=(entry,interval)=>{
  const rd=getRevDate(entry,interval);
  return rd<todayStr() && entry.reviews[String(interval)]===null;
};
const getEntryStatus=(entry)=>{
  for(const iv of REV_INTERVALS){
    if(entry.reviews[String(iv)]===null){
      const rd=getRevDate(entry,iv);
      if(rd<=todayStr())return 'due';
    }
  }
  const allDone=REV_INTERVALS.every(iv=>entry.reviews[String(iv)]===true);
  if(allDone)return 'complete';
  return 'upcoming';
};
const getTodayDueEntries=(entries)=>entries.filter(e=>
  REV_INTERVALS.some(iv=>isRevDueToday(e,iv)||isRevOverdue(e,iv))
);

/* ── RevisionCard ────────────────────────────────────*/
function RevisionCard({entry,onToggle,onDelete,compact=false}){
  const [open,setOpen]=useState(false);
  const col=subjColor(entry.subject);
  const status=getEntryStatus(entry);
  const hasDue=REV_INTERVALS.some(iv=>isRevDueToday(entry,iv)||isRevOverdue(entry,iv));
  const hasOverdue=REV_INTERVALS.some(iv=>isRevOverdue(entry,iv));

  return(
    <div style={{background:SUR,borderRadius:18,border:`1px solid ${hasDue?col+'55':OL}`,
      marginBottom:9,boxShadow:hasDue?`0 2px 12px ${col}22`:'0 1px 4px rgba(103,80,164,0.07)',
      overflow:'hidden'}}>
      <button onClick={()=>setOpen(v=>!v)}
        style={{display:'flex',alignItems:'center',gap:10,width:'100%',
          padding:'12px 14px',background:'none',border:'none',
          textAlign:'left',cursor:'pointer'}}>
        <div style={{width:36,height:36,borderRadius:12,background:col+'22',
          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontSize:12,fontWeight:900,color:col}}>{entry.subject.slice(0,3)}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
            <span style={{fontSize:13,fontWeight:700,color:TX}}>{entry.subject}</span>
            {entry.topic&&<span style={{fontSize:11,color:TS,fontWeight:500}}>· {entry.topic}</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:TS}}>{fmtDate(entry.dateStudied)}</span>
            {entry.pages&&<span style={{fontSize:10,color:TS}}>· pp.{entry.pages}</span>}
            {hasOverdue&&<Chip label="OVERDUE" color='#C62828' small/>}
            {!hasOverdue&&hasDue&&<Chip label="DUE TODAY" color='#E65100' small/>}
            {status==='complete'&&<Chip label="✓ COMPLETE" color='#388E3C' small/>}
          </div>
        </div>
        <Ico d={open?IC.up:IC.down} s={16} c={TS}/>
      </button>

      {open&&(
        <div style={{padding:'0 14px 14px'}}>
          {/* interval progress */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>
            {REV_INTERVALS.map(iv=>{
              const rd=getRevDate(entry,iv);
              const val=entry.reviews[String(iv)];
              const due=isRevDueToday(entry,iv);
              const over=isRevOverdue(entry,iv);
              const done=val===true;
              const bg=done?'#E8F5E9':over?'#FFEBEE':due?'#FFF3E0':SV;
              const border=done?'#43A047':over?'#EF9A9A':due?'#FFB74D':OL;
              const tc=done?'#2E7D32':over?'#C62828':due?'#E65100':TS;
              return(
                <button key={iv} onClick={()=>onToggle(entry.id,iv)}
                  style={{background:bg,border:`2px solid ${border}`,
                    borderRadius:12,padding:'6px 10px',cursor:'pointer',
                    textAlign:'center',minWidth:62,transition:'all 0.15s',
                    fontFamily:'Nunito,sans-serif'}}>
                  <div style={{fontSize:10,fontWeight:700,color:tc}}>{REV_LABELS[iv]}</div>
                  <div style={{fontSize:9,color:tc,marginTop:1,opacity:0.8}}>{fmtDate(rd)}</div>
                  <div style={{fontSize:11,fontWeight:800,marginTop:2,
                    color:done?'#2E7D32':over?'#C62828':due?'#E65100':'#BDBDBD'}}>
                    {done?'✓':over?'!':due?'→':'○'}
                  </div>
                </button>
              );
            })}
          </div>
          {/* completion bar */}
          <div style={{height:4,background:OL,borderRadius:2,marginBottom:10,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,transition:'width 0.4s',
              background:`linear-gradient(90deg,${col},${col}88)`,
              width:`${(REV_INTERVALS.filter(iv=>entry.reviews[String(iv)]===true).length/6)*100}%`
            }}/>
          </div>
          {entry.notes&&(
            <div style={{fontSize:12,color:TM,background:SV,borderRadius:10,
              padding:'8px 10px',marginBottom:10,lineHeight:1.5}}>
              📝 {entry.notes}
            </div>
          )}
          <button onClick={()=>onDelete(entry.id)}
            style={{display:'flex',alignItems:'center',gap:6,
              background:'#FFEBEE',border:'1px solid #FFCDD2',
              borderRadius:10,padding:'6px 12px',cursor:'pointer',
              fontSize:11,fontWeight:700,color:'#D32F2F',
              fontFamily:'Nunito,sans-serif'}}>
            <Ico d={IC.trash} s={12} c='#D32F2F'/> Delete entry
          </button>
        </div>
      )}
    </div>
  );
}

/* ── AddRevisionModal ───────────────────────────────*/
function AddRevisionModal({onAdd,onClose}){
  const [subj,setSubj]=useState('SOM');
  const [customSubj,setCustomSubj]=useState('');
  const [topic,setTopic]=useState('');
  const [pages,setPages]=useState('');
  const [date,setDate]=useState(todayStr());
  const [notes,setNotes]=useState('');

  const doAdd=()=>{
    const s=subj==='Other'?customSubj.trim():subj;
    if(!s){return;}
    const reviews={};
    REV_INTERVALS.forEach(iv=>{reviews[String(iv)]=null;});
    onAdd({id:uid(),subject:s,topic:topic.trim(),pages:pages.trim(),
      dateStudied:date,notes:notes.trim(),reviews});
    onClose();
  };

  return(
    <BSModal onClose={onClose}>
      <div style={{fontSize:17,fontWeight:900,color:TX,marginBottom:16}}>
        📚 Log New Study Session
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div>
          <label style={LBL}>Subject</label>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:subj==='Other'?8:0}}>
            {GATE_SUBJECTS.map(s=>(
              <button key={s} onClick={()=>setSubj(s)}
                style={{padding:'6px 12px',borderRadius:20,border:`2px solid ${subj===s?subjColor(s):OL}`,
                  background:subj===s?subjColor(s)+'22':SUR,
                  color:subj===s?subjColor(s):TM,
                  fontSize:12,fontWeight:700,cursor:'pointer',
                  fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                {s}
              </button>
            ))}
          </div>
          {subj==='Other'&&(
            <input value={customSubj} onChange={e=>setCustomSubj(e.target.value)}
              placeholder="Enter subject name"
              style={INPS}/>
          )}
        </div>
        <div>
          <label style={LBL}>Topic / Chapter (optional)</label>
          <input value={topic} onChange={e=>setTopic(e.target.value)}
            placeholder="e.g. Bending Stress, Mohr's Circle"
            style={INPS}/>
        </div>
        <div style={{display:'flex',gap:10}}>
          <div style={{flex:1}}>
            <label style={LBL}>Pages (optional)</label>
            <input value={pages} onChange={e=>setPages(e.target.value)}
              placeholder="e.g. 45-67"
              style={INPS}/>
          </div>
          <div style={{flex:1}}>
            <label style={LBL}>Date Studied</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={INPS}/>
          </div>
        </div>
        <div>
          <label style={LBL}>Quick Notes (optional)</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Key concepts, doubts, formulas to remember…"
            style={{...INPS,height:70,resize:'none'}}/>
        </div>
        <div style={{background:'#E8F5E9',borderRadius:12,padding:'10px 12px',
          fontSize:11,color:'#2E7D32',lineHeight:1.6}}>
          🔁 System will auto-schedule reviews at: <b>Same Day → Day 3 → Day 6 → Day 30 → Day 60 → Day 90</b>
        </div>
        <div style={{display:'flex',gap:9,marginTop:4}}>
          <button onClick={doAdd}
            style={{flex:1,padding:'13px',
              background:`linear-gradient(90deg,${P},#9C68FF)`,
              border:'none',borderRadius:14,color:'#FFF',
              fontWeight:900,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Log Session
          </button>
          <button onClick={onClose}
            style={{flex:1,padding:'13px',background:SV,
              border:`2px solid ${OL}`,borderRadius:14,color:TM,
              fontWeight:700,fontSize:14,cursor:'pointer',
              fontFamily:'Nunito,sans-serif'}}>
            Cancel
          </button>
        </div>
      </div>
    </BSModal>
  );
}

const LBL={fontSize:11,fontWeight:700,color:TS,display:'block',marginBottom:5,letterSpacing:0.3};
const INPS={width:'100%',border:`2px solid ${OL}`,borderRadius:12,padding:'10px 12px',
  fontSize:13,color:TX,background:SV,boxSizing:'border-box',fontWeight:600,
  fontFamily:'Nunito,sans-serif',outline:'none'};

/* ═══════════════════════════════════════════════════
   REVISION VIEW (full tab)
   ═══════════════════════════════════════════════════ */
function RevisionView({entries,onToggle,onDelete,onAdd}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterSubj,setFilterSubj]=useState('All');
  const [search,setSearch]=useState('');
  const [tab,setTab]=useState('due'); // due | all | complete

  const today=todayStr();
  const allSubjects=['All',...[...new Set(entries.map(e=>e.subject))].sort()];

  const filtered=useMemo(()=>{
    let r=entries;
    if(filterSubj!=='All')r=r.filter(e=>e.subject===filterSubj);
    if(search.trim())r=r.filter(e=>
      e.subject.toLowerCase().includes(search.toLowerCase())||
      e.topic.toLowerCase().includes(search.toLowerCase())
    );
    if(tab==='due')r=r.filter(e=>['due'].includes(getEntryStatus(e)));
    if(tab==='complete')r=r.filter(e=>getEntryStatus(e)==='complete');
    return [...r].sort((a,b)=>a.dateStudied<b.dateStudied?1:-1);
  },[entries,filterSubj,search,tab]);

  const dueCount=entries.filter(e=>getEntryStatus(e)==='due').length;
  const completeCount=entries.filter(e=>getEntryStatus(e)==='complete').length;

  return(
    <div>
      {/* summary cards */}
      <div style={{display:'flex',gap:9,marginBottom:14}}>
        <div style={{flex:1,background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',
          borderRadius:18,padding:'13px',border:'1px solid #FFB74D',
          boxShadow:'0 2px 10px rgba(255,152,0,0.15)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#E65100',letterSpacing:1}}>DUE / OVERDUE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#E65100',lineHeight:1.1}}>{dueCount}</div>
          <div style={{fontSize:11,color:'#F57C00'}}>topics need review</div>
        </div>
        <div style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
          borderRadius:18,padding:'13px',border:'1px solid #A5D6A7',
          boxShadow:'0 2px 10px rgba(56,142,60,0.12)'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>COMPLETE</div>
          <div style={{fontSize:28,fontWeight:900,color:'#2E7D32',lineHeight:1.1}}>{completeCount}</div>
          <div style={{fontSize:11,color:'#388E3C'}}>of {entries.length} total</div>
        </div>
      </div>

      {/* search */}
      <div style={{position:'relative',marginBottom:10}}>
        <div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)'}}>
          <Ico d={IC.search} s={15} c={TS}/>
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search subject or topic…"
          style={{width:'100%',border:`2px solid ${OL}`,borderRadius:14,
            padding:'10px 12px 10px 36px',fontSize:13,color:TX,
            background:SUR,boxSizing:'border-box',fontFamily:'Nunito,sans-serif',
            outline:'none'}}/>
      </div>

      {/* subject filter chips */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:12,
        paddingBottom:4,WebkitOverflowScrolling:'touch'}}>
        {allSubjects.map(s=>(
          <button key={s} onClick={()=>setFilterSubj(s)}
            style={{flexShrink:0,padding:'5px 12px',borderRadius:20,
              border:`2px solid ${filterSubj===s?(s==='All'?P:subjColor(s)):OL}`,
              background:filterSubj===s?(s==='All'?PC:subjColor(s)+'22'):SUR,
              color:filterSubj===s?(s==='All'?P:subjColor(s)):TM,
              fontSize:11,fontWeight:700,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',whiteSpace:'nowrap'}}>
            {s}
          </button>
        ))}
      </div>

      {/* tab bar */}
      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,
        marginBottom:14,gap:2}}>
        {[['due',`Due/Overdue (${dueCount})`],['all','All Entries'],['complete',`Done (${completeCount})`]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:'8px 4px',borderRadius:12,border:'none',
              background:tab===id?SUR:'transparent',
              color:tab===id?P:TS,
              fontSize:11,fontWeight:tab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:tab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {/* entries */}
      {filtered.length===0?(
        <div style={{textAlign:'center',padding:'40px 20px',color:TS}}>
          <div style={{fontSize:36,marginBottom:8}}>{tab==='due'?'🎉':'📭'}</div>
          <div style={{fontSize:15,fontWeight:700,color:TX}}>
            {tab==='due'?'No pending reviews!':'No entries found'}
          </div>
          <div style={{fontSize:13,marginTop:4}}>
            {tab==='due'?'All caught up. Keep studying!':'Try a different filter or add new entries'}
          </div>
        </div>
      ):filtered.map(entry=>(
        <RevisionCard key={entry.id} entry={entry}
          onToggle={onToggle} onDelete={onDelete}/>
      ))}

      {showAdd&&<AddRevisionModal onAdd={onAdd} onClose={()=>setShowAdd(false)}/>}
      {/* FAB handled in parent */}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   STATS VIEW
   ═══════════════════════════════════════════════════ */
function StatsView({daily,logs,revEntries}){
  const [stab,setStab]=useState('habits');
  const bestStr=useMemo(()=>Math.max(0,...daily.map((_,i)=>getStreak(logs,i))),[logs,daily]);
  const avg30=useMemo(()=>daily.length?Math.round(daily.reduce((a,_,i)=>a+getRate(logs,i,30),0)/daily.length):0,[logs,daily]);

  /* revision stats per subject */
  const subjStats=useMemo(()=>{
    const m={};
    revEntries.forEach(e=>{
      if(!m[e.subject])m[e.subject]={total:0,done:0,intervals:{0:0,3:0,6:0,30:0,60:0,90:0}};
      m[e.subject].total++;
      let allDone=true;
      REV_INTERVALS.forEach(iv=>{
        if(e.reviews[String(iv)]===true)m[e.subject].intervals[iv]++;
        else allDone=false;
      });
      if(allDone)m[e.subject].done++;
    });
    return Object.entries(m).map(([s,v])=>({subject:s,...v,
      completionPct:v.total?Math.round(
        (REV_INTERVALS.reduce((a,iv)=>a+v.intervals[iv],0)/(v.total*6))*100
      ):0
    })).sort((a,b)=>b.completionPct-a.completionPct);
  },[revEntries]);

  return(
    <div>
      <div style={{display:'flex',background:SV,borderRadius:14,padding:3,marginBottom:14,gap:2}}>
        {[['habits','Habit Stats'],['revision','Revision Stats']].map(([id,lbl])=>(
          <button key={id} onClick={()=>setStab(id)}
            style={{flex:1,padding:'9px',borderRadius:12,border:'none',
              background:stab===id?SUR:'transparent',color:stab===id?P:TS,
              fontSize:13,fontWeight:stab===id?800:600,cursor:'pointer',
              fontFamily:'Nunito,sans-serif',
              boxShadow:stab===id?'0 1px 4px rgba(103,80,164,0.15)':'none',
              transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {stab==='habits'&&(
        <div>
          <div style={{display:'flex',gap:9,marginBottom:14}}>
            <div style={{flex:1,background:`linear-gradient(135deg,${PC},#DDD8FF)`,
              borderRadius:18,padding:'14px',border:`1px solid ${OL}`}}>
              <div style={{fontSize:10,fontWeight:700,color:P,letterSpacing:1}}>BEST STREAK</div>
              <div style={{fontSize:30,fontWeight:900,color:P}}>{bestStr}d</div>
            </div>
            <div style={{flex:1,background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
              borderRadius:18,padding:'14px',border:'1px solid #A5D6A7'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#2E7D32',letterSpacing:1}}>30D AVG</div>
              <div style={{fontSize:30,fontWeight:900,color:'#2E7D32'}}>{avg30}%</div>
            </div>
          </div>
          {daily.map((h,i)=>{
            const col=hc(i);
            const st=getStreak(logs,i),lg=getLongest(logs,i);
            const r7=getRate(logs,i,7),r30=getRate(logs,i,30);
            return(
              <div key={i} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:9,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <div style={{width:9,height:9,borderRadius:'50%',background:col.f}}/>
                  <span style={{fontSize:13,fontWeight:700,color:TX,flex:1}}>{h}</span>
                  {st>=3&&<Chip label={`🔥${st}d`} color={col.f} small/>}
                </div>
                <div style={{display:'flex',gap:6}}>
                  {[[`${st}d`,'Streak',col.f],[`${r7}%`,'7d',P],[`${r30}%`,'30d','#0097A7'],[`${lg}d`,'Best','#C2185B']].map(([v,l,c2])=>(
                    <div key={l} style={{flex:1,background:SV,borderRadius:12,padding:'8px 4px',textAlign:'center'}}>
                      <div style={{fontSize:15,fontWeight:900,color:c2}}>{v}</div>
                      <div style={{fontSize:9,color:TS,fontWeight:600,marginTop:1,textTransform:'uppercase',letterSpacing:0.5}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{height:4,background:OL,borderRadius:2,marginTop:9,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${r30}%`,background:col.f,borderRadius:2,transition:'width 0.5s'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {stab==='revision'&&(
        <div>
          <SH ch="Completion rate by subject"/>
          {subjStats.length===0&&(
            <div style={{textAlign:'center',padding:'30px',color:TS,fontSize:13}}>
              No revision data yet. Start logging study sessions!
            </div>
          )}
          {subjStats.map(({subject,total,done,completionPct,intervals})=>{
            const col=subjColor(subject);
            return(
              <div key={subject} style={{background:SUR,border:`1px solid ${OL}`,
                borderRadius:20,padding:'14px',marginBottom:10,
                boxShadow:'0 1px 4px rgba(103,80,164,0.07)'}}>
                <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:10}}>
                  <div style={{width:32,height:32,borderRadius:10,background:col+'22',
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <span style={{fontSize:11,fontWeight:900,color:col}}>{subject.slice(0,3)}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:800,color:TX}}>{subject}</div>
                    <div style={{fontSize:11,color:TS}}>{total} sessions · {done} fully complete</div>
                  </div>
                  <div style={{fontSize:22,fontWeight:900,color:col}}>{completionPct}%</div>
                </div>
                <div style={{height:6,background:OL,borderRadius:3,overflow:'hidden',marginBottom:10}}>
                  <div style={{height:'100%',width:`${completionPct}%`,
                    background:`linear-gradient(90deg,${col},${col}88)`,
                    borderRadius:3,transition:'width 0.5s'}}/>
                </div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {REV_INTERVALS.map(iv=>(
                    <div key={iv} style={{background:SV,borderRadius:10,
                      padding:'5px 8px',textAlign:'center',flex:'1 1 50px'}}>
                      <div style={{fontSize:13,fontWeight:800,color:col}}>{intervals[iv]}</div>
                      <div style={{fontSize:8,color:TS,letterSpacing:0.5}}>{REV_LABELS[iv]}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   TODAY VIEW (Habits + Due Revisions combined)
   ═══════════════════════════════════════════════════ */
function TodayView({daily,logs,TK,toggleToday,revEntries,onRevToggle,chart7,todayDone,todayPct,bestStr,avg30}){
  const dueEntries=useMemo(()=>getTodayDueEntries(revEntries),[revEntries]);

  return(
    <div>
      {/* Hero */}
      <div style={{background:'linear-gradient(135deg,#6750A4 0%,#9C68FF 100%)',
        borderRadius:26,padding:'18px 18px 18px 20px',marginBottom:14,
        display:'flex',alignItems:'center',gap:14,
        boxShadow:'0 8px 28px rgba(103,80,164,0.28)'}}>
        <div style={{position:'relative',flexShrink:0}}>
          <Ring pct={todayPct} size={95} color='#FFF'/>
          <div style={{position:'absolute',top:'50%',left:'50%',
            transform:'translate(-50%,-50%)',textAlign:'center',lineHeight:1}}>
            <div style={{fontSize:19,fontWeight:900,color:'#FFF'}}>{todayPct}%</div>
          </div>
        </div>
        <div style={{color:'#FFF',flex:1}}>
          <div style={{fontSize:26,fontWeight:900,lineHeight:1.1}}>{todayDone} habits</div>
          <div style={{fontSize:12,opacity:0.75,marginTop:2}}>
            {daily.length-todayDone} left · {dueEntries.length} revisions due
          </div>
          <div style={{display:'flex',gap:7,marginTop:10,flexWrap:'wrap'}}>
            <span style={{background:'rgba(255,255,255,0.22)',borderRadius:10,
              padding:'3px 10px',fontSize:11,fontWeight:700}}>🔥 Best: {bestStr}d</span>
            <span style={{background:'rgba(255,255,255,0.22)',borderRadius:10,
              padding:'3px 10px',fontSize:11,fontWeight:700}}>📊 30d: {avg30}%</span>
          </div>
        </div>
      </div>

      {/* Due revisions banner */}
      {dueEntries.length>0&&(
        <div style={{background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',
          borderRadius:20,padding:'14px',marginBottom:14,
          border:'2px solid #FFB74D',
          boxShadow:'0 3px 14px rgba(255,152,0,0.18)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
            <Ico d={IC.bell} s={16} c='#E65100'/>
            <span style={{fontSize:13,fontWeight:900,color:'#E65100'}}>
              {dueEntries.length} Revision{dueEntries.length>1?'s':''} Due Today
            </span>
          </div>
          {dueEntries.slice(0,4).map(entry=>{
            const dueIntervals=REV_INTERVALS.filter(iv=>isRevDueToday(entry,iv)||isRevOverdue(entry,iv));
            const isOver=dueIntervals.some(iv=>isRevOverdue(entry,iv));
            const col=subjColor(entry.subject);
            return(
              <div key={entry.id} style={{background:'rgba(255,255,255,0.7)',
                borderRadius:14,padding:'10px 12px',marginBottom:7,
                border:`1px solid ${isOver?'#EF9A9A':'#FFB74D'}`}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:900,color:col,
                    background:col+'22',borderRadius:8,padding:'2px 7px'}}>{entry.subject}</span>
                  {entry.topic&&<span style={{fontSize:11,color:TM}}>{entry.topic}</span>}
                  {isOver&&<Chip label="OVERDUE" color='#C62828' small/>}
                  <span style={{fontSize:10,color:TS,marginLeft:'auto'}}>{fmtDate(entry.dateStudied)}</span>
                </div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {dueIntervals.map(iv=>(
                    <button key={iv} onClick={()=>onRevToggle(entry.id,iv)}
                      style={{padding:'5px 10px',borderRadius:10,
                        border:`2px solid ${entry.reviews[String(iv)]===true?'#43A047':'#FFB74D'}`,
                        background:entry.reviews[String(iv)]===true?'#E8F5E9':'#FFF',
                        color:entry.reviews[String(iv)]===true?'#2E7D32':'#E65100',
                        fontSize:11,fontWeight:700,cursor:'pointer',
                        fontFamily:'Nunito,sans-serif',transition:'all 0.15s'}}>
                      {entry.reviews[String(iv)]===true?'✓ ':''}{REV_LABELS[iv]}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
          {dueEntries.length>4&&(
            <div style={{fontSize:11,color:'#E65100',fontWeight:600,marginTop:4,paddingLeft:4}}>
              +{dueEntries.length-4} more — check Revision tab
            </div>
          )}
        </div>
      )}

      {/* Habit list */}
      <SH ch="Today's Habits — tap to check off"/>
      {daily.map((h,i)=>{
        const done=!!(logs[TK]||{})[i];
        const st=getStreak(logs,i);
        const col=hc(i);
        return(
          <button key={i} className="hbtn" onClick={()=>toggleToday(i)}
            style={{display:'flex',alignItems:'center',gap:12,width:'100%',
              background:done?col.bg:SUR,
              border:`2px solid ${done?col.f:OL}`,
              borderRadius:18,padding:'11px 14px',marginBottom:7,
              textAlign:'left',cursor:'pointer',transition:'all 0.15s',
              boxShadow:done?`0 2px 12px ${col.f}22`:'0 1px 4px rgba(103,80,164,0.07)'}}>
            <div style={{width:26,height:26,borderRadius:9,flexShrink:0,
              background:done?col.f:OL,
              display:'flex',alignItems:'center',justifyContent:'center',
              transition:'all 0.15s'}}>
              {done&&<Ico d={IC.check} s={14} c='#FFF' sw={3}/>}
            </div>
            <span style={{flex:1,fontSize:14,fontWeight:done?600:700,
              color:done?col.dk:TX,textDecoration:done?'line-through':'none',lineHeight:1.3}}>
              {h}
            </span>
            {st>=3&&<span style={{fontSize:11,fontWeight:800,color:col.f,
              background:col.lt,border:`1px solid ${col.f}44`,
              padding:'2px 8px',borderRadius:10,flexShrink:0}}>🔥{st}</span>}
          </button>
        );
      })}
      {!daily.length&&(
        <div style={{textAlign:'center',padding:'30px 20px',color:TS}}>
          <div style={{fontSize:36,marginBottom:8}}>🎯</div>
          <div style={{fontSize:14,fontWeight:700}}>No habits yet. Go to Settings tab to add!</div>
        </div>
      )}

      {/* 7-day chart */}
      <div style={{background:SUR,borderRadius:22,padding:'15px',
        border:`1px solid ${OL}`,marginTop:6,marginBottom:14,
        boxShadow:'0 1px 6px rgba(103,80,164,0.07)'}}>
        <SH ch="Last 7 Days — Habit Completion"/>
        <div style={{display:'flex',gap:5,height:86,alignItems:'flex-end',marginTop:8}}>
          {chart7.map((d,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <div style={{fontSize:9,fontWeight:700,color:d.isToday?P:TS}}>{d.pct}%</div>
              <div style={{width:'100%',borderRadius:'5px 5px 0 0',
                height:`${Math.max(4,d.pct)}%`,minHeight:4,
                background:d.isToday?`linear-gradient(0deg,${P},#B388FF)`:'#E4DAFB',
                boxShadow:d.isToday?`0 2px 8px ${P}44`:undefined,
                transition:'height 0.4s'}}/>
              <div style={{fontSize:9,fontWeight:d.isToday?800:500,
                color:d.isToday?P:TS}}>{d.day}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SETTINGS VIEW
   ═══════════════════════════════════════════════════ */
function SettingsView({daily,weekly,setDaily,setWeekly,setLogs,setRevEntries,
  logs,revEntries,wlogs,setWlogs,addType,setAddType,newName,setNewName,doAdd,

/* ═══════════════════════════════════════════════════

function MonthlyView({daily,logs,vy,vm,T,toggleDay}){
  const dim=daysIn(vy,vm);
  return(
    <div>
      <div style={{display:'flex',gap:14,fontSize:11,color:TS,
        marginBottom:10,paddingLeft:2,flexWrap:'wrap'}}>
        <span style={{color:'#388E3C',fontWeight:700}}>≥80% green</span>
        <span style={{color:'#F57C00',fontWeight:700}}>50-79% orange</span>
        <span style={{color:'#C62828',fontWeight:700}}>below 50% red</span>
      </div>
      <div style={{background:SUR,borderRadius:20,overflow:'hidden',
        border:`1px solid ${OL}`,boxShadow:'0 1px 6px rgba(103,80,164,0.08)',marginBottom:12}}>
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <table style={{borderCollapse:'collapse',width:'100%',minWidth:(140+dim*22)+'px'}}>
            <thead>
              <tr style={{background:'#FAFAFF'}}>
                <th style={{position:'sticky',left:0,zIndex:5,background:'#FAFAFF',
                  borderRight:`1px solid ${OL}`,textAlign:'left',
                  padding:'8px 10px',fontSize:10,color:TS,fontWeight:700,minWidth:130}}>HABIT</th>
                {Array.from({length:dim},(_,di)=>{
                  const wd=new Date(vy,vm,di+1);
                  const isT=T.y===vy&&T.m===vm&&T.d===di+1;
                  return(
                    <th key={di} style={{padding:'5px 1px',minWidth:22,textAlign:'center',
                      fontSize:9,fontWeight:700,background:isT?PC:'#FAFAFF',color:isT?P:TS}}>
                      <div>{di+1}</div>
                      <div style={{opacity:0.5}}>{WD[wd.getDay()][0]}</div>
                    </th>
                  );
                })}
                <th style={{padding:'5px 7px',fontSize:9,color:TS,fontWeight:700,minWidth:34,textAlign:'center'}}>%</th>
              </tr>
            </thead>
            <tbody>
              {daily.map((h,hi)=>{
                const col=hc(hi);
                const rel=T.y===vy&&T.m===vm?T.d:dim;
                let dn=0;
                for(let d=1;d<=rel;d++)if((logs[dk(vy,vm,d)]||{})[hi])dn++;
                const mpct=Math.round(dn/rel*100);
                return(
                  <tr key={hi} style={{borderTop:`1px solid #F0EAFE`}}>
                    <td style={{position:'sticky',left:0,zIndex:2,background:SUR,
                      borderRight:`1px solid ${OL}`,padding:'6px 10px'}}>
                      <span style={{fontSize:11,fontWeight:700,color:TX,display:'block',
                        maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h}</span>
                    </td>
                    {Array.from({length:dim},(_,di)=>{
                      const day=di+1,k2=dk(vy,vm,day);
                      const on=!!(logs[k2]||{})[hi];
                      const fut=T.y===vy&&T.m===vm&&day>T.d;
                      const isT2=T.y===vy&&T.m===vm&&T.d===day;
                      return(
                        <td key={di} style={{padding:'3px 1px',textAlign:'center',
                          background:isT2?`${PC}66`:undefined}}>
                          <button onClick={()=>!fut&&toggleDay(hi,vy,vm,day)}
                            style={{width:15,height:15,borderRadius:4,border:'none',
                              background:on?col.f:'#EEE8FF',cursor:fut?'default':'pointer',
                              opacity:fut?0.18:1,display:'block',margin:'0 auto',
                              boxShadow:on?`0 1px 4px ${col.f}55`:undefined,
                              transition:'all 0.12s'}}/>
                        </td>
                      );
                    })}
                    <td style={{textAlign:'center',padding:'3px 7px'}}>
                      <span style={{fontSize:11,fontWeight:800,
                        color:mpct>=80?'#388E3C':mpct>=50?'#F57C00':'#C62828'}}>{mpct}%</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function WeeklyView({weekly,wlogs,CWK,toggleWeekly}){
  const wDone=weekly.filter((_,i)=>(wlogs[CWK]||{})[i]).length;
  const wPct=weekly.length?Math.round(wDone/weekly.length*100):0;
  return(
    <div>
      <div style={{background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',
        borderRadius:24,padding:'18px',marginBottom:14,
        border:'1px solid #A5D6A7',boxShadow:'0 4px 16px rgba(56,142,60,0.14)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'#2E7D32',marginBottom:3}}>
          Week {CWK.split('-W')[1]} · {new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
        </div>
        <div style={{fontSize:28,fontWeight:900,color:'#1B5E20',lineHeight:1,marginBottom:10}}>
          {wDone}/{weekly.length}
          <span style={{fontSize:14,fontWeight:600,color:'#388E3C',marginLeft:8}}>goals done</span>
        </div>
        <div style={{height:7,background:'rgba(255,255,255,0.5)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${wPct}%`,
            background:'linear-gradient(90deg,#43A047,#66BB6A)',
            borderRadius:4,transition:'width 0.5s'}}/>
        </div>
      </div>
      {weekly.map((h,i)=>{
        const done=!!(wlogs[CWK]||{})[i];
        return(
          <button key={i} className="hbtn" onClick={()=>toggleWeekly(i)}
            style={{display:'flex',alignItems:'center',gap:12,width:'100%',
              background:done?'#E8F5E9':SUR,border:`2px solid ${done?'#43A047':OL}`,
              borderRadius:18,padding:'13px 15px',marginBottom:8,
              textAlign:'left',cursor:'pointer',transition:'all 0.15s',
              boxShadow:done?'0 2px 12px rgba(67,160,71,0.2)':'0 1px 4px rgba(103,80,164,0.07)'}}>
            <div style={{width:30,height:30,borderRadius:10,flexShrink:0,
              background:done?'#43A047':OL,
              display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
              {done&&<Ico d={IC.check} s={16} c='#FFF' sw={3}/>}
            </div>
            <span style={{flex:1,fontSize:14,fontWeight:done?600:700,
              color:done?'#2E7D32':TX,textDecoration:done?'line-through':'none'}}>{h}</span>
          </button>
        );

      {!weekly.length&&(
        <div style={{textAlign:'center',padding:'30px 20px',color:TS}}>
          <div style={{fontSize:13,fontWeight:600}}>No weekly goals yet. Tap + to add!</div>
        </div>
      )}

  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
function App(){
  const init=loadData();
  const [daily,setDaily]=useState(init.daily);
  const [weekly,setWeekly]=useState(init.weekly);
  const [logs,setLogs]=useState(init.logs);
  const [wlogs,setWlogs]=useState(init.wlogs);
  const [revEntries,setRevEntries]=useState(init.revEntries||SEED_ENTRIES);
  const [view,setView]=useState('today');
  const [vy,setVy]=useState(()=>new Date().getFullYear());
  const [vm,setVm]=useState(()=>new Date().getMonth());
  const [addType,setAddType]=useState(null);
  const [showAddRev,setShowAddRev]=useState(false);
  const [newName,setNewName]=useState('');
  const [editId,setEditId]=useState(null);
  const [editTxt,setEditTxt]=useState('');
  const [delConf,setDelConf]=useState(null);
  const [pasteOpen,setPasteOpen]=useState(false);
  const [pasteTxt,setPasteTxt]=useState('');
  const [toast,setToast]=useState(null);
  const [syncStatus,setSyncStatus]=useState('loading');
  const fileRef=useRef(null);

  const T=now2();
  const TK=dk(T.y,T.m,T.d);
  const CWK=wkKey();

  /* Load from Firebase on first open */
  useEffect(()=>{
    if(!window.__FB_LOAD__){setSyncStatus('offline');return;}
    window.__FB_LOAD__().then(d=>{
      if(d&&Array.isArray(d.daily)){
        setDaily(d.daily);
        if(Array.isArray(d.weekly))setWeekly(d.weekly);
        if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
        if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
        if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
        saveLocal(d);
      }
      setSyncStatus('synced');
    }).catch(()=>setSyncStatus('offline'));
  },[]);

  /* Auto-save whenever data changes */
  const isFirstRender=useRef(true);
  useEffect(()=>{
    if(isFirstRender.current){isFirstRender.current=false;return;}
    const data={daily,weekly,logs,wlogs,revEntries};
    saveLocal(data);
    if(window.__FB_SAVE__){
      setSyncStatus('saving');
      clearTimeout(window._fbTimer);
      window._fbTimer=setTimeout(()=>{
        window.__FB_SAVE__(data)
          .then(()=>setSyncStatus('synced'))
          .catch(()=>setSyncStatus('offline'));
      },1500);
    }
  },[daily,weekly,logs,wlogs,revEntries]);

  const toast$=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};

  /* HABIT TOGGLES */
  const toggleToday=i=>setLogs(p=>({...p,[TK]:{...(p[TK]||{}),[i]:!(p[TK]||{})[i]}}));
  const toggleDay=(i,y,m,d)=>{const k=dk(y,m,d);setLogs(p=>({...p,[k]:{...(p[k]||{}),[i]:!(p[k]||{})[i]}}));};
  const toggleWeekly=i=>setWlogs(p=>({...p,[CWK]:{...(p[CWK]||{}),[i]:!(p[CWK]||{})[i]}}));

  /* REVISION TOGGLE */
  const toggleRevision=(entryId,interval)=>{
    setRevEntries(prev=>prev.map(e=>{
      if(e.id!==entryId)return e;
      const cur=e.reviews[String(interval)];
      const next=cur===true?null:true;
      return{...e,reviews:{...e.reviews,[String(interval)]:next}};
    }));
  };
  const addRevEntry=entry=>{setRevEntries(p=>[entry,...p]);toast$('Session logged ✅');};
  const deleteRevEntry=id=>{setRevEntries(p=>p.filter(e=>e.id!==id));toast$('Entry deleted','warn');};

  /* HABIT ADD */
  const doAdd=()=>{
    const n=newName.trim();if(!n)return;
    if(addType==='daily')setDaily(p=>[...p,n]);else setWeekly(p=>[...p,n]);
    setNewName('');setAddType(null);toast$('Added ✅');
  };

  /* HABIT EDIT */
  const saveEdit=()=>{
    if(!editId)return;
    const n=editTxt.trim();if(!n){setEditId(null);return;}
    if(editId.type==='daily')setDaily(p=>p.map((h,i)=>i===editId.idx?n:h));
    else setWeekly(p=>p.map((h,i)=>i===editId.idx?n:h));
    setEditId(null);setEditTxt('');
  };

  /* HABIT DELETE */
  const doDelete=(type,idx)=>{
    if(type==='daily'){
      setDaily(p=>p.filter((_,i)=>i!==idx));
      setLogs(prev=>{
        const next={};
        for(const k of Object.keys(prev)){
          const e=prev[k];const ne={};
          for(const hi of Object.keys(e)){
            const h=parseInt(hi,10);
            if(h<idx)ne[h]=e[hi];else if(h>idx)ne[h-1]=e[hi];
          }
          if(Object.keys(ne).length)next[k]=ne;
        }return next;
      });
    }else{setWeekly(p=>p.filter((_,i)=>i!==idx));}
    setDelConf(null);toast$('Deleted','warn');
  };

  /* REORDER */
  const moveH=(type,idx,dir)=>{
    const ni=idx+dir;
    if(type==='daily'){
      if(ni<0||ni>=daily.length)return;
      setDaily(p=>{const a=[...p];[a[idx],a[ni]]=[a[ni],a[idx]];return a;});
      setLogs(prev=>{
        const next={};
        for(const k of Object.keys(prev)){
          const e=prev[k];if(!e)continue;
          const ne={...e};
          const av=ne[idx],bv=ne[ni];
          if(av!==undefined)ne[ni]=av;else delete ne[ni];
          if(bv!==undefined)ne[idx]=bv;else delete ne[idx];
          next[k]=ne;
        }return next;
      });
    }else{
      if(ni<0||ni>=weekly.length)return;
      setWeekly(p=>{const a=[...p];[a[idx],a[ni]]=[a[ni],a[idx]];return a;});
    }
  };

  /* BACKUP EXPORT */
  const doExport=()=>{
    const json=JSON.stringify({daily,weekly,logs,wlogs,revEntries,v:5,at:new Date().toISOString()},null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`habitra-backup-${TK}.json`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast$('Backup downloaded ✅');
  };

  /* COPY */
  const doCopy=async()=>{
    const json=JSON.stringify({daily,weekly,logs,wlogs,revEntries,v:5,at:new Date().toISOString()});
    try{await navigator.clipboard.writeText(json);toast$('Copied to clipboard ✅');}
    catch(e){toast$('Copy failed — use Download','warn');}
  };

  /* RESTORE FILE */
  const doFileRestore=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(Array.isArray(d.daily))setDaily(d.daily);
        if(Array.isArray(d.weekly))setWeekly(d.weekly);
        if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
        if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
        if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
        toast$('Data restored ✅');
      }catch(err){toast$('Invalid file — not a Habitra backup','err');}
      e.target.value='';
    };
    r.onerror=()=>toast$('File read error','err');
    r.readAsText(f);
  };

  /* RESTORE PASTE */
  const doPasteRestore=()=>{
    try{
      const d=JSON.parse(pasteTxt.trim());
      if(Array.isArray(d.daily))setDaily(d.daily);
      if(Array.isArray(d.weekly))setWeekly(d.weekly);
      if(d.logs&&typeof d.logs==='object')setLogs(d.logs);
      if(d.wlogs&&typeof d.wlogs==='object')setWlogs(d.wlogs);
      if(Array.isArray(d.revEntries))setRevEntries(d.revEntries);
      toast$('Restored from pasted JSON ✅');
      setPasteTxt('');setPasteOpen(false);
    }catch(e){toast$('Invalid JSON','err');}
  };

  /* DERIVED */
  const todayDone=daily.filter((_,i)=>(logs[TK]||{})[i]).length;
  const todayPct=daily.length?Math.round(todayDone/daily.length*100):0;
  const bestStr=useMemo(()=>Math.max(0,...daily.map((_,i)=>getStreak(logs,i))),[logs,daily]);
  const avg30=useMemo(()=>daily.length?Math.round(daily.reduce((a,_,i)=>a+getRate(logs,i,30),0)/daily.length):0,[logs,daily]);
  const chart7=useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const k=dk(d.getFullYear(),d.getMonth(),d.getDate());
    const done=daily.filter((_,idx)=>(logs[k]||{})[idx]).length;
    return{day:WD[d.getDay()],pct:daily.length?Math.round(done/daily.length*100):0,isToday:i===6};
  }),[logs,daily]);

  const dueRevCount=useMemo(()=>getTodayDueEntries(revEntries).length,[revEntries]);
  const prevM=()=>vm===0?(setVm(11),setVy(y=>y-1)):setVm(m=>m-1);
  const nextM=()=>vm===11?(setVm(0),setVy(y=>y+1)):setVm(m=>m+1);

  /* NAV ITEMS */
  const NAV=[
    ['today',IC.home,'Today'],
    ['monthly',IC.bar,'Monthly'],
    ['revision',IC.book,'Revise'],
    ['stats',IC.bell,'Stats'],
    ['settings',IC.gear,'More'],
  ];

  /* Show loading screen while fetching from Firebase */
  if(syncStatus==='loading'){
    return(
      <div style={{minHeight:'100vh',background:BG,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center',gap:16}}>
        <div style={{width:56,height:56,borderRadius:18,
          background:'linear-gradient(135deg,#7C4DFF,#B388FF)',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 6px 20px rgba(124,77,255,0.4)'}}>
          <Ico d={IC.flame} s={28} c='#FFF' fill='none'/>
        </div>
        <div style={{fontSize:22,fontWeight:900,color:P,letterSpacing:-0.5}}>HABITRA</div>
        <div style={{fontSize:13,color:TS,fontWeight:600}}>Syncing your data… ☁️</div>
        <div style={{width:120,height:4,background:OL,borderRadius:2,overflow:'hidden',marginTop:4}}>
          <div style={{width:'60%',height:'100%',background:`linear-gradient(90deg,${P},#B388FF)`,
            borderRadius:2,animation:'slide 1.2s ease-in-out infinite'}}/>
        </div>
        <style>{`@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}`}</style>
      </div>
    );
  }

  return(
    <div style={{minHeight:'100vh',background:BG,paddingBottom:80}}>

      {/* HEADER */}
      <div style={{background:SUR,padding:'12px 16px 10px',
        borderBottom:`1px solid ${OL}`,position:'sticky',top:0,zIndex:30,
        display:'flex',alignItems:'center',justifyContent:'space-between',
        boxShadow:'0 2px 10px rgba(103,80,164,0.09)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:12,
            background:'linear-gradient(135deg,#7C4DFF,#B388FF)',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 3px 10px rgba(124,77,255,0.35)'}}>
            <Ico d={IC.flame} s={18} c='#FFF' fill='none'/>
          </div>
          <div>
            <div style={{fontSize:16,fontWeight:900,color:P,letterSpacing:-0.3}}>HABITRA</div>
            <div style={{fontSize:10,color:TS,fontWeight:500,marginTop:-1}}>
              {new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          {view==='today'&&(
            <div style={{background:PC,borderRadius:20,padding:'5px 11px',
              fontSize:11,fontWeight:800,color:P}}>
              {todayDone}/{daily.length}
            </div>
          )}
          {dueRevCount>0&&view==='today'&&(
            <div style={{background:'#FFF3E0',borderRadius:20,padding:'5px 11px',
              fontSize:11,fontWeight:800,color:'#E65100',border:'1px solid #FFB74D'}}>
              🔁 {dueRevCount}
            </div>
          )}
          <div style={{
              borderRadius:20,padding:'5px 11px',fontSize:11,fontWeight:800,
              display:'flex',alignItems:'center',gap:5,
              background:syncStatus==='synced'?'#E8F5E9':syncStatus==='saving'?'#FFF3E0':syncStatus==='loading'?'#EDE7FF':'#FFEBEE',
              color:syncStatus==='synced'?'#2E7D32':syncStatus==='saving'?'#E65100':syncStatus==='loading'?P:'#B71C1C',
              border:`1px solid ${syncStatus==='synced'?'#A5D6A7':syncStatus==='saving'?'#FFB74D':syncStatus==='loading'?OL:'#FFCDD2'}`}}>
            <span>{syncStatus==='synced'?'☁️ Synced':syncStatus==='saving'?'⏳ Saving…':syncStatus==='loading'?'⏳ Loading…':'📴 Offline'}</span>
          </div>
          {view==='monthly'&&(
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <button onClick={prevM} style={{background:'#EDE7FF',border:'none',
                borderRadius:9,padding:'5px 11px',cursor:'pointer',
                fontSize:15,fontWeight:700,color:P,fontFamily:'Nunito,sans-serif'}}>‹</button>
              <span style={{fontSize:12,fontWeight:700,color:TX,minWidth:76,textAlign:'center'}}>
                {MONTHS[vm]} {vy}
              </span>
              <button onClick={nextM} style={{background:'#EDE7FF',border:'none',
                borderRadius:9,padding:'5px 11px',cursor:'pointer',
                fontSize:15,fontWeight:700,color:P,fontFamily:'Nunito,sans-serif'}}>›</button>
            </div>
          )}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:'14px 14px 0',maxWidth:540,margin:'0 auto'}}>

        {view==='today'&&(
          <TodayView daily={daily} logs={logs} TK={TK} toggleToday={toggleToday}
            revEntries={revEntries} onRevToggle={toggleRevision}
            chart7={chart7} todayDone={todayDone} todayPct={todayPct}
            bestStr={bestStr} avg30={avg30}/>
        )}
        {view==='monthly'&&(
          <MonthlyView daily={daily} logs={logs} vy={vy} vm={vm} T={T} toggleDay={toggleDay}/>
        )}
        {view==='weekly'&&(
          <WeeklyView weekly={weekly} wlogs={wlogs} CWK={CWK} toggleWeekly={toggleWeekly}/>
        )}
        {view==='revision'&&(
          <RevisionView entries={revEntries} onToggle={toggleRevision}
            onDelete={deleteRevEntry} onAdd={addRevEntry}/>
        )}
        {view==='stats'&&(
          <StatsView daily={daily} logs={logs} revEntries={revEntries}/>
        )}
        {view==='settings'&&(
          <SettingsView daily={daily} weekly={weekly}
            setDaily={setDaily} setWeekly={setWeekly}
            setLogs={setLogs} setRevEntries={setRevEntries}
            logs={logs} revEntries={revEntries} wlogs={wlogs} setWlogs={setWlogs}
            addType={addType} setAddType={setAddType}
            newName={newName} setNewName={setNewName} doAdd={doAdd}
            editId={editId} setEditId={setEditId} editTxt={editTxt}
            setEditTxt={setEditTxt} saveEdit={saveEdit}
            delConf={delConf} setDelConf={setDelConf} doDelete={doDelete}
            moveH={moveH} pasteOpen={pasteOpen} setPasteOpen={setPasteOpen}
            pasteTxt={pasteTxt} setPasteTxt={setPasteTxt} doPasteRestore={doPasteRestore}
            doExport={doExport} doCopy={doCopy} doFileRestore={doFileRestore} fileRef={fileRef}/>
        )}
      </div>

      {/* FAB */}
      {(view==='today'||view==='weekly')&&(
        <button onClick={()=>setAddType(view==='today'?'daily':'weekly')}
          style={{position:'fixed',bottom:82,right:16,
            width:52,height:52,borderRadius:17,
            background:`linear-gradient(135deg,${P},#9C68FF)`,
            border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 6px 20px rgba(103,80,164,0.42)',zIndex:20}}>
          <Ico d={IC.plus} s={24} c='#FFF'/>
        </button>
      )}
      {view==='revision'&&(
        <button onClick={()=>setShowAddRev(true)}
          style={{position:'fixed',bottom:82,right:16,
            width:52,height:52,borderRadius:17,
            background:'linear-gradient(135deg,#0097A7,#00BCD4)',
            border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 6px 20px rgba(0,151,167,0.42)',zIndex:20}}>
          <Ico d={IC.plus} s={24} c='#FFF'/>
        </button>
      )}

      {/* BOTTOM NAV */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,
        background:'rgba(255,255,255,0.97)',backdropFilter:'blur(12px)',
        borderTop:`1px solid ${OL}`,display:'flex',zIndex:25,
        boxShadow:'0 -2px 14px rgba(103,80,164,0.09)',
        paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        {NAV.map(([id,icon,lbl])=>(
          <button key={id} onClick={()=>setView(id)}
            style={{flex:1,padding:'8px 2px 6px',background:'none',border:'none',
              display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',
              position:'relative'}}>
            <div style={{width:40,height:27,borderRadius:14,
              background:view===id?PC:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',
              transition:'background 0.2s'}}>
              <Ico d={icon} s={17} c={view===id?P:TS}/>
            </div>
            <span style={{fontSize:9,fontWeight:view===id?800:500,
              color:view===id?P:TS,letterSpacing:0.1}}>{lbl}</span>
            {id==='revision'&&dueRevCount>0&&(
              <div style={{position:'absolute',top:5,right:'18%',width:14,height:14,
                borderRadius:'50%',background:'#E65100',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span style={{fontSize:8,fontWeight:900,color:'#FFF'}}>{dueRevCount>9?'9+':dueRevCount}</span>
              </div>
            )}
          </button>
        ))}
      </nav>

      {/* ADD HABIT MODAL */}
      {addType&&(
        <BSModal onClose={()=>{setAddType(null);setNewName('');}}>
          <div style={{fontSize:17,fontWeight:900,color:TX,marginBottom:4}}>
            Add {addType==='daily'?'Daily Habit':'Weekly Goal'}
          </div>
          <div style={{fontSize:12,color:TS,marginBottom:14}}>
            Tip: start with an emoji 🎯
          </div>
          <input autoFocus value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')doAdd();if(e.key==='Escape'){setAddType(null);setNewName('');}}}
            placeholder={addType==='daily'?'e.g. 📖 Morning revision 1hr':'e.g. 📋 Full mock test'}
            style={{width:'100%',border:`2px solid ${OL}`,borderRadius:14,
              padding:'13px 14px',fontSize:14,color:TX,background:SV,
              boxSizing:'border-box',fontWeight:600,outline:'none',
              fontFamily:'Nunito,sans-serif'}}
            onFocus={e=>e.target.style.borderColor=P}
            onBlur={e=>e.target.style.borderColor=OL}/>
          <div style={{display:'flex',gap:9,marginTop:13}}>
            <button onClick={doAdd}
              style={{flex:1,padding:'13px',
                background:`linear-gradient(90deg,${P},#9C68FF)`,
                border:'none',borderRadius:14,color:'#FFF',
                fontWeight:900,fontSize:14,cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
              Add
            </button>
            <button onClick={()=>{setAddType(null);setNewName('');}}
              style={{flex:1,padding:'13px',background:SV,border:`2px solid ${OL}`,
                borderRadius:14,color:TM,fontWeight:700,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>
              Cancel
            </button>
          </div>
        </BSModal>
      )}

      {/* ADD REVISION MODAL */}
      {showAddRev&&<AddRevisionModal onAdd={addRevEntry} onClose={()=>setShowAddRev(false)}/>}

      {/* DELETE CONFIRM */}
      {delConf&&(
        <BSModal onClose={()=>setDelConf(null)}>
          <div style={{fontSize:17,fontWeight:900,color:'#B71C1C',marginBottom:8}}>Delete habit?</div>
          <div style={{fontSize:13,color:TM,marginBottom:20,
            background:'#FFEBEE',borderRadius:12,padding:'12px 14px',lineHeight:1.5}}>
            <b>"{delConf.type==='daily'?daily[delConf.idx]:weekly[delConf.idx]}"</b><br/>
            <span style={{color:'#D32F2F',fontSize:12}}>All log history for this habit will be permanently deleted.</span>
          </div>
          <div style={{display:'flex',gap:9}}>
            <button onClick={()=>doDelete(delConf.type,delConf.idx)}
              style={{flex:1,padding:'13px',background:'#FFCDD2',border:'2px solid #EF9A9A',
                borderRadius:14,color:'#B71C1C',fontWeight:900,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>Delete</button>
            <button onClick={()=>setDelConf(null)}
              style={{flex:1,padding:'13px',background:SV,border:`2px solid ${OL}`,
                borderRadius:14,color:TM,fontWeight:700,fontSize:14,cursor:'pointer',
                fontFamily:'Nunito,sans-serif'}}>Cancel</button>
          </div>
        </BSModal>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{position:'fixed',top:76,left:'50%',transform:'translateX(-50%)',zIndex:100,
          background:toast.type==='err'?'#B71C1C':toast.type==='warn'?'#E65100':'#2E7D32',
          color:'#FFF',borderRadius:22,padding:'10px 22px',
          fontSize:13,fontWeight:800,whiteSpace:'nowrap',
          boxShadow:'0 4px 18px rgba(0,0,0,0.18)'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
